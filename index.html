<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comercial Mariano — Sistema de Processos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'IBM Plex Sans',system-ui,sans-serif;background:#eeece8;color:#1c1c1c;font-size:14px;line-height:1.5}
:root{
  --sb-w:222px;--sb-bg:#0d3b7a;
  --accent:#1565c0;--accent-dark:#0d4d9a;--accent-bg:rgba(21,101,192,.10);
  --bg:#f0f4f9;--sur:#fff;--sur2:#f4f7fb;--sur3:#e8eef6;
  --bdr:#dce4ef;--bdr2:#c5d1e3;
  --t1:#1a2535;--t2:#4a5568;--t3:#8898aa;
  --ok:#2e7d45;--ok-bg:#eaf3ec;--err:#c0392b;--err-bg:#fdecea;
  --r:8px;--rl:12px;
  --shadow:0 4px 16px rgba(21,101,192,.08);--shadow-lg:0 8px 32px rgba(21,101,192,.13);
  --tr:.16s ease;
}
.app{display:flex;height:100vh;overflow:hidden}

/* ── SIDEBAR ── */
.painel-custom-icon{width:20px;height:20px;mix-blend-mode:screen;opacity:.8;flex-shrink:0;object-fit:contain}
.nav-item.active .painel-custom-icon{opacity:1}

.sidebar{width:var(--sb-w);background:var(--sb-bg);display:flex;flex-direction:column;flex-shrink:0;transition:width var(--tr);overflow:hidden;z-index:10}
.sidebar.collapsed{width:56px}
.sb-header{display:flex;align-items:center;gap:10px;padding:17px 14px 13px;border-bottom:1px solid rgba(255,255,255,.07);min-height:58px}
.sidebar.collapsed .sb-header{cursor:pointer;padding:13px 14px;}
.sidebar.collapsed .sb-header:hover{background:rgba(255,255,255,.05)}
.sb-logo{width:32px;height:32px;min-width:32px;background:#fff;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#1565c0;flex-shrink:0;letter-spacing:-.5px}
.sb-brand{font-size:13px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;transition:opacity var(--tr),width var(--tr)}
.sidebar.collapsed .sb-brand{opacity:0;width:0}
.sb-toggle{margin-left:auto;background:none;border:none;cursor:pointer;color:rgba(255,255,255,.5);display:flex;padding:6px;border-radius:6px;transition:color var(--tr),background var(--tr);flex-shrink:0}
.sb-toggle:hover{color:rgba(255,255,255,.9);background:rgba(255,255,255,.12)}
.sidebar.collapsed .sb-toggle{margin-left:0;padding:8px;color:rgba(255,255,255,.7)}
.sb-nav{flex:1;padding:8px 0;overflow:hidden}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 14px;cursor:pointer;color:rgba(255,255,255,.45);font-size:13px;white-space:nowrap;transition:background var(--tr),color var(--tr);position:relative}
.nav-item:hover{background:rgba(255,255,255,.05);color:rgba(255,255,255,.82)}
.nav-item.active{background:var(--accent-bg);color:var(--accent)}
.nav-item.active::before{content:'';position:absolute;left:0;top:7px;bottom:7px;width:3px;background:var(--accent);border-radius:0 3px 3px 0}
.nav-item i{font-size:18px;min-width:20px;flex-shrink:0}
/* Bitrix submenu */
.nav-sub{overflow:hidden;max-height:0;transition:max-height .2s ease;background:rgba(0,0,0,.15)}
.nav-sub.open{max-height:120px}
.nav-sub-item{display:flex;align-items:center;gap:8px;padding:8px 14px 8px 44px;cursor:pointer;color:rgba(255,255,255,.4);font-size:12px;transition:background var(--tr),color var(--tr);white-space:nowrap}
.nav-sub-item:hover{background:rgba(255,255,255,.05);color:rgba(255,255,255,.75)}
.nav-sub-item.active{color:var(--accent);font-weight:600}
.nav-item .nav-chevron{margin-left:auto;font-size:11px;transition:transform .2s;opacity:.5}
.nav-item.sub-open .nav-chevron{transform:rotate(180deg)}
.nav-label{transition:opacity var(--tr),width var(--tr);overflow:hidden;white-space:nowrap}
.sidebar.collapsed .nav-label{opacity:0;width:0}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;min-height:0}
.topbar{display:flex;align-items:center;gap:8px;padding:0 20px;height:54px;background:var(--sur);border-bottom:1px solid var(--bdr);flex-shrink:0}
.topbar-icon{font-size:17px;color:var(--accent)}
.topbar h1{font-size:15px;font-weight:600;color:var(--t1)}
.topbar-sub{font-size:12px;color:var(--t3)}
.content{flex:1;overflow:hidden;display:flex;flex-direction:column;position:relative;min-height:0;min-width:0}

/* ── COMMON BUTTONS ── */
.btn-primary{display:flex;align-items:center;gap:6px;background:var(--accent);color:#fff;border:none;border-radius:var(--r);cursor:pointer;font-size:13px;font-weight:500;font-family:inherit;padding:7px 16px;transition:background var(--tr);flex-shrink:0}
.btn-primary:hover{background:var(--accent-dark)}
.btn-sec{display:flex;align-items:center;gap:5px;background:none;border:1px solid var(--bdr);border-radius:var(--r);cursor:pointer;font-size:13px;color:var(--t1);font-family:inherit;padding:6px 12px;transition:background var(--tr),border-color var(--tr)}
.btn-sec:hover{background:var(--sur2);border-color:var(--bdr2)}
.btn-back{display:flex;align-items:center;gap:5px;background:none;border:1px solid var(--bdr);border-radius:var(--r);cursor:pointer;font-size:13px;color:var(--t2);font-family:inherit;padding:6px 12px;transition:background var(--tr),color var(--tr)}
.btn-back:hover{background:var(--sur2);color:var(--t1)}
.btn-back i,.btn-sec i{font-size:15px}
.btn-sm{height:30px;padding:0 11px;background:var(--accent);color:#fff;border:none;border-radius:var(--r);cursor:pointer;font-size:12px;font-family:inherit;font-weight:500;transition:background var(--tr);white-space:nowrap;flex-shrink:0;display:flex;align-items:center;gap:4px}
.btn-sm:hover{background:var(--accent-dark)}
.btn-sm.sec{background:var(--sur);color:var(--t1);border:1px solid var(--bdr)}
.btn-sm.sec:hover{background:var(--sur2)}
.icon-btn{display:flex;align-items:center;gap:5px;height:34px;padding:0 12px;background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);cursor:pointer;font-size:13px;color:var(--t1);font-family:inherit;white-space:nowrap;flex-shrink:0;transition:background var(--tr),border-color var(--tr);position:relative}
.icon-btn:hover{background:var(--sur2);border-color:var(--bdr2)}
.icon-btn i{font-size:15px}

/* ── PAINEL ── */
.painel-body{flex:1;overflow:auto;padding:20px 24px;min-width:0;min-height:0;background:var(--bg)}
/* ── PAINEL ── */
.pi-kpi{background:var(--sur);border-radius:var(--rl);border:1px solid var(--bdr);padding:16px 18px;display:flex;flex-direction:column;gap:2px;transition:box-shadow var(--tr),transform var(--tr);cursor:default;min-height:110px}
.pi-kpi:hover{box-shadow:0 4px 18px rgba(0,0,0,.07);transform:translateY(-1px)}
.pi-kpi-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:10px}
.pi-kpi-val{font-size:32px;font-weight:700;line-height:1;letter-spacing:-.5px}
.pi-kpi-label{font-size:11px;font-weight:500;color:var(--t3);margin-top:2px;text-transform:uppercase;letter-spacing:.05em}
.pi-kpi-sub{font-size:11px;margin-top:6px;display:flex;align-items:center;gap:4px}
.pi-card{background:var(--sur);border-radius:var(--rl);border:1px solid var(--bdr);display:flex;flex-direction:column;overflow:hidden}
.pi-card-hdr{display:flex;align-items:center;gap:8px;padding:13px 16px;border-bottom:1px solid var(--bdr);font-size:13px;font-weight:600;color:var(--t1);flex-shrink:0}
.pi-card-body{padding:14px 16px;flex:1;overflow:hidden}
.pi-aprov-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--bdr);transition:background var(--tr)}
.pi-aprov-row:last-child{border-bottom:none}
.pi-aprov-row:hover{background:var(--sur2);margin:0 -16px;padding:9px 16px}
.pi-aprov-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);flex-shrink:0;animation:pulseDot 2s infinite}
@keyframes pulseDot{0%,100%{opacity:1}50%{opacity:.35}}
.pi-bar-track{height:6px;background:var(--sur3);border-radius:3px;overflow:hidden;margin:4px 0}
.pi-bar-fill{height:100%;border-radius:3px;transition:width .5s ease}
.pi-dept-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--bdr)}
.pi-dept-row:last-child{border-bottom:none}
.pi-dept-icon{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.pi-pct-badge{font-size:11px;font-weight:600;padding:2px 7px;border-radius:8px;flex-shrink:0}
.pi-cov-row{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--bdr)}
.pi-cov-row:last-child{border-bottom:none}
.pi-cov-pct{font-size:18px;font-weight:700;min-width:44px;text-align:right}
.pi-cov-bar-wrap{flex:1;min-width:0}
.pi-cov-bar-track{height:8px;background:var(--sur3);border-radius:4px;overflow:hidden;margin-top:4px}
.pi-cov-bar-fill{height:100%;border-radius:4px;transition:width .6s ease}
.pi-section-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);margin-bottom:12px}
.pi-alert-badge{background:#fee2e2;color:#b91c1c;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px}
.pi-ok-badge{background:var(--ok-bg);color:var(--ok);font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px}
.pi-warn-badge{background:#fff8e1;color:#b45309;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px}
@keyframes pulseCard{0%,100%{box-shadow:0 0 0 0 rgba(185,28,28,.15)}50%{box-shadow:0 0 0 6px rgba(185,28,28,.0)}}
.section-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);margin-bottom:13px}
.stats-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:26px}
.stat-card{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);padding:16px;cursor:pointer;transition:border-color var(--tr),box-shadow var(--tr),transform var(--tr)}
.stat-card:hover{border-color:var(--bdr2);box-shadow:0 2px 8px rgba(0,0,0,.06);transform:translateY(-1px)}
.stat-label{font-size:11px;color:var(--t2);line-height:1.45;margin-bottom:10px}
.stat-value{font-size:28px;font-weight:600;color:var(--t1);line-height:1}
.stat-action{font-size:11px;color:var(--accent);margin-top:6px}
.stat-card.orange .stat-value{color:var(--accent)}
.stat-card.blue .stat-value{color:#2875ca}
.stat-card.green .stat-value{color:var(--ok)}
.stat-card.red .stat-value{color:var(--err)}
.cargo-wrap{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--rl);overflow:hidden}
.data-table{width:100%;border-collapse:collapse}
.data-table th{padding:10px 14px;text-align:left;font-size:11px;font-weight:600;color:var(--t2);background:var(--sur2);border-bottom:1px solid var(--bdr);white-space:nowrap}
.data-table td{padding:10px 14px;border-bottom:1px solid var(--bdr);color:var(--t1);font-size:13px}
.data-table tbody tr:last-child td{border-bottom:none}
.data-table tbody tr:hover td{background:var(--sur2)}
.bar-wrap{width:86px;height:5px;background:var(--sur3);border-radius:3px;overflow:hidden}
.bar{height:100%;background:var(--accent);border-radius:3px}
.cargo-pill{display:inline-block;background:var(--accent-bg);color:var(--accent-dark);font-size:12px;font-weight:500;padding:3px 10px;border-radius:20px}

/* ── ATIVIDADES TOOLBAR ── */
.ativ-toolbar{padding:10px 16px;background:var(--sur);border-bottom:1px solid var(--bdr);flex-shrink:0}
.search-row{display:flex;align-items:center;gap:8px}
.search-box{flex:1;display:flex;align-items:center;gap:8px;background:var(--sur2);border:1px solid var(--bdr);border-radius:var(--r);padding:0 12px;height:34px;transition:border-color var(--tr)}
.search-box:focus-within{border-color:var(--accent)}
.search-box i{font-size:16px;color:var(--t3);flex-shrink:0}
.search-box input{flex:1;background:none;border:none;outline:none;font-size:13px;color:var(--t1);font-family:inherit;min-width:0}
.search-box input::placeholder{color:var(--t3)}
.f-badge{background:var(--accent);color:#fff;font-size:10px;font-weight:600;padding:1px 5px;border-radius:6px}
.chips-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.chip{display:inline-flex;align-items:center;gap:4px;background:var(--accent-bg);color:var(--accent-dark);font-size:12px;font-weight:500;padding:3px 8px 3px 10px;border-radius:20px}
.chip-rm{background:none;border:none;cursor:pointer;color:var(--accent-dark);font-size:15px;line-height:1;padding:0;display:flex;align-items:center}
.chip-rm:hover{color:var(--err)}
.drop-wrap{position:relative;flex-shrink:0}
.dropdown{position:absolute;top:calc(100% + 5px);left:0;background:var(--sur);border:1px solid var(--bdr);border-radius:var(--rl);padding:6px;z-index:200;min-width:195px;box-shadow:var(--shadow);animation:fdDown .12s ease}
.dropdown.right{left:auto;right:0;min-width:215px}
@keyframes fdDown{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.dd-sec{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--t3);padding:6px 8px 4px}
.dd-opt{display:flex;align-items:center;gap:7px;padding:7px 8px;font-size:13px;color:var(--t1);cursor:pointer;border-radius:6px;transition:background var(--tr)}
.dd-opt:hover{background:var(--sur2)}
.dd-opt i{font-size:14px;color:var(--t2)}
.col-item{display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:5px;font-size:13px;color:var(--t1)}
.col-item label{flex:1;cursor:pointer;user-select:none}
.col-item input[type=checkbox]{cursor:pointer;accent-color:var(--accent);flex-shrink:0}
.col-ord{display:flex;gap:2px}
.col-ord button{background:none;border:1px solid var(--bdr);border-radius:4px;cursor:pointer;color:var(--t2);padding:1px 5px;font-size:10px;line-height:1.5;transition:background var(--tr)}
.col-ord button:hover{background:var(--sur2)}
.col-ord button:disabled{opacity:.28;cursor:default}

/* ── ATIVIDADES TABLE ── */
.ativ-table-wrap{flex:1;overflow:auto;min-height:0;min-width:0}
.ativ-table{width:max-content;min-width:100%;border-collapse:collapse;font-size:13px}
.ativ-table th{padding:9px 13px;text-align:left;font-size:11px;font-weight:600;color:var(--t2);background:var(--sur2);border-bottom:1px solid var(--bdr);white-space:nowrap;user-select:none;position:sticky;top:0;z-index:5}
.ativ-table th[draggable=true]{cursor:grab}
.ativ-table th.drag-over{background:rgba(232,137,42,.1);border-bottom:2px solid var(--accent)}
.ativ-table td{padding:9px 13px;border-bottom:1px solid var(--bdr);white-space:nowrap;max-width:210px;overflow:hidden;text-overflow:ellipsis}
.ativ-table tbody tr{transition:background var(--tr)}
.ativ-table tbody tr:hover td{background:#f9f8f5;cursor:pointer}
.ativ-table tbody tr:last-child td{border-bottom:none}
.badge-y{display:inline-flex;align-items:center;gap:3px;background:var(--ok-bg);color:var(--ok);font-size:11px;font-weight:500;padding:2px 7px;border-radius:20px}
.badge-n{background:var(--sur3);color:var(--t3);font-size:11px;padding:2px 7px;border-radius:20px;display:inline-flex}
.setor-badge{display:inline-block;font-size:11px;font-weight:500;padding:2px 8px;border-radius:20px}
.s-Comercial{background:#dbeafe;color:#1e40af}.s-Financeiro{background:#d1fae5;color:#065f46}
.s-Logística{background:#e0f2fe;color:#0369a1}.s-RH{background:#ede9fe;color:#5b21b6}
.s-Gerência{background:#e0e7ff;color:#3730a3}.s-Atendimento{background:#cffafe;color:#0e7490}
.s-SAC{background:#dcfce7;color:#166534}.s-Financeiro{background:#d1fae5;color:#065f46}
.empty-td{text-align:center;padding:34px!important;color:var(--t3)!important;font-size:13px}
.col-grip{display:inline-flex;align-items:center;gap:5px}
.col-grip i{font-size:12px;color:var(--t3);opacity:.7}

/* ── DETAIL OVERLAY (Atividades) ── */
.detail-overlay{position:absolute;inset:0;z-index:50;display:flex;flex-direction:column;background:var(--bg);animation:slideIn .18s ease}
@keyframes slideIn{from{opacity:0;transform:translateX(10px)}to{opacity:1;transform:translateX(0)}}
.det-topbar{display:flex;align-items:center;gap:10px;padding:0 20px;height:54px;background:var(--sur);border-bottom:1px solid var(--bdr);flex-shrink:0}
.det-title{font-size:15px;font-weight:600;color:var(--t1);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.det-body{flex:1;overflow:auto;padding:20px;display:flex;gap:16px;min-height:0;min-width:0}
.det-left{flex:1.1;min-width:280px;min-height:0;display:flex;flex-direction:column;gap:14px;align-self:flex-start}
.det-right{width:360px;flex-shrink:0;min-height:0;display:flex;flex-direction:column;gap:14px;align-self:flex-start}
/* video detail scroll wrapper */
.vid-scroll-body{flex:1;overflow:auto;min-height:0;min-width:0}
.vid-inner{max-width:780px;margin:0 auto;padding:20px;display:flex;flex-direction:column;gap:14px}
.det-card{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--rl);overflow:hidden;flex-shrink:0}
.det-card-hdr{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;background:var(--sur2);border-bottom:1px solid var(--bdr)}
.det-card-hdr h3{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--t2);display:flex;align-items:center;gap:6px}
.det-card-hdr h3 i{font-size:14px}
.det-alt{background:none;border:none;cursor:pointer;font-size:12px;color:var(--accent);font-family:inherit;font-weight:500;padding:0;transition:color var(--tr)}
.det-alt:hover{color:var(--accent-dark)}
.det-card-body{padding:13px 14px}
.video-ph{width:100%;height:170px;background:var(--sur2);border:1px dashed var(--bdr2);border-radius:var(--r);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--t3)}
.video-ph i{font-size:32px;opacity:.6}
.video-ph span{font-size:12px}
.video-player{position:relative;padding-top:56.25%;background:#000;border-radius:var(--r);overflow:hidden}
.video-player iframe{position:absolute;inset:0;width:100%;height:100%;border:none}
.vid-url-row{display:flex;gap:7px;margin-top:10px;align-items:center}
.vid-url-row input{flex:1;height:32px;background:var(--sur2);border:1px solid var(--bdr);border-radius:var(--r);padding:0 10px;font-size:12px;color:var(--t1);outline:none;font-family:inherit;min-width:0;transition:border-color var(--tr)}
.vid-url-row input:focus{border-color:var(--accent)}
.rte-tb{display:flex;gap:1px;padding:6px 10px;background:var(--sur2);border-bottom:1px solid var(--bdr);flex-wrap:wrap}
.rte-btn{background:none;border:none;cursor:pointer;padding:4px 7px;border-radius:5px;color:var(--t2);font-family:inherit;font-size:13px;line-height:1.3;transition:background var(--tr),color var(--tr)}
.rte-btn:hover{background:var(--sur3);color:var(--t1)}
.rte-sep{width:1px;height:17px;background:var(--bdr);margin:4px 3px;align-self:center}
.rte-body{min-height:100px;padding:12px 14px;outline:none;font-size:13px;color:var(--t1);line-height:1.65;font-family:inherit}
.rte-body[contenteditable=true]:focus{background:rgba(232,137,42,.015)}
.rte-body:empty::before{content:attr(data-ph);color:var(--t3);pointer-events:none}
.linked-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.lchip{display:inline-flex;align-items:center;gap:5px;padding:5px 9px 5px 8px;background:var(--sur2);border:1px solid var(--bdr);border-radius:20px;font-size:12px;color:var(--t1)}
.lchip i{font-size:13px;color:var(--accent)}
.lchip-rm{background:none;border:none;cursor:pointer;color:var(--t3);font-size:14px;line-height:1;padding:0 0 0 2px;display:flex;align-items:center}
.lchip-rm:hover{color:var(--err)}
.add-link{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border:1px dashed var(--bdr2);border-radius:20px;font-size:12px;color:var(--t2);cursor:pointer;background:none;font-family:inherit;transition:border-color var(--tr),color var(--tr)}
.add-link:hover{border-color:var(--accent);color:var(--accent)}
.picker{margin-top:8px;background:var(--sur);border:1px solid var(--bdr);border-radius:var(--rl);overflow:hidden;box-shadow:var(--shadow)}
.pick-item{display:flex;align-items:center;gap:8px;padding:9px 12px;font-size:13px;color:var(--t1);cursor:pointer;transition:background var(--tr);border-bottom:1px solid var(--bdr)}
.pick-item:last-child{border-bottom:none}
.pick-item:hover{background:var(--sur2)}
.pick-item.sel{color:var(--accent);background:var(--accent-bg)}
.pick-item i{font-size:15px;flex-shrink:0}
.pick-sub{font-size:11px;color:var(--t3);margin-left:auto;flex-shrink:0}
.task-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--bdr)}
.task-row:last-child{border-bottom:none}
.task-icon{font-size:14px;color:var(--accent);flex-shrink:0}
.task-name{flex:1;font-size:13px;color:var(--t1);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.task-resp{font-size:11px;color:var(--t3);flex-shrink:0}
.task-rm{background:none;border:none;cursor:pointer;color:var(--t3);display:flex;padding:3px;border-radius:4px;flex-shrink:0;transition:color var(--tr),background var(--tr)}
.task-rm:hover{color:var(--err);background:var(--err-bg)}
.meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px 14px}
.meta-field{display:flex;flex-direction:column;gap:4px;min-width:0}
.meta-field.full{grid-column:1/-1}
.meta-field label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--t3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.meta-val{font-size:13px;color:var(--t1);min-width:0;overflow:hidden;text-overflow:ellipsis}
.meta-field input,.meta-field select{height:34px;background:var(--sur2);border:1px solid var(--bdr);border-radius:var(--r);padding:0 10px;font-size:13px;color:var(--t1);outline:none;font-family:inherit;transition:border-color var(--tr);width:100%;box-sizing:border-box}
.meta-field input:focus,.meta-field select:focus{border-color:var(--accent)}

/* ── MAPEAMENTO LIST ── */
.map-body{flex:1;overflow:auto;padding:20px;min-height:0;min-width:0}
.map-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:12px}
.map-card{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--rl);padding:16px 18px;cursor:pointer;transition:border-color var(--tr),box-shadow var(--tr),transform var(--tr);display:flex;flex-direction:column;gap:10px}
.map-card:hover{border-color:var(--bdr2);box-shadow:var(--shadow);transform:translateY(-2px)}
.map-card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.map-card-name{font-size:14px;font-weight:600;color:var(--t1);line-height:1.35}
.map-tipo{font-size:11px;font-weight:500;padding:3px 8px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.t-BPMN{background:#e6f0fb;color:#1a5fa8}
.t-Jornada{background:#f2ecfb;color:#5b2d91}
.t-Fluxograma{background:#e8f5ec;color:#1e6b2f}
.map-card-acts{display:flex;flex-wrap:wrap;gap:5px}
.map-act-chip{font-size:11px;background:var(--sur2);border:1px solid var(--bdr);color:var(--t2);padding:2px 8px;border-radius:20px}
.map-act-more{font-size:11px;color:var(--t3);padding:2px 0}
.map-card-dates{display:flex;gap:16px;font-size:11px;color:var(--t3)}
.map-card-dates span b{color:var(--t2);font-weight:500}
.map-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--t3);padding:60px 20px;text-align:center}
.map-empty i{font-size:48px;opacity:.25}
.map-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.map-header h2{font-size:15px;font-weight:600;color:var(--t1)}
.map-header span{font-size:13px;color:var(--t3)}

/* ── MAPEAMENTO DETAIL ── */
.map-det-overlay{position:absolute;inset:0;z-index:50;display:flex;flex-direction:column;background:var(--bg);animation:slideIn .18s ease}
.map-det-topbar{display:flex;align-items:center;gap:10px;padding:0 16px;height:50px;background:var(--sur);border-bottom:1px solid var(--bdr);flex-shrink:0}
.map-det-title{font-size:14px;font-weight:600;color:var(--t1);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.map-det-body{flex:1;display:flex;overflow:auto;min-height:0;min-width:0}

/* BPMN EDITOR */
.bpmn-editor{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;min-height:0}
.bpmn-toolbar{display:flex;align-items:center;gap:4px;padding:7px 10px;background:var(--sur);border-bottom:1px solid var(--bdr);flex-shrink:0;overflow-x:auto;overflow-y:hidden}
.bpmn-toolbar-sep{width:1px;height:20px;background:var(--bdr);margin:0 4px}
.bpmn-tool-btn{display:flex;align-items:center;gap:5px;height:30px;padding:0 10px;background:none;border:1px solid transparent;border-radius:var(--r);cursor:pointer;font-size:12px;color:var(--t2);font-family:inherit;transition:background var(--tr),border-color var(--tr),color var(--tr)}
.bpmn-tool-btn:hover{background:var(--sur2);color:var(--t1)}
.bpmn-tool-btn.active{background:var(--accent-bg);border-color:rgba(232,137,42,.3);color:var(--accent)}
.bpmn-tool-btn i{font-size:15px}
.bpmn-tool-btn.del-btn:hover{background:var(--err-bg);color:var(--err);border-color:rgba(192,57,43,.2)}
.bpmn-content{flex:1;display:flex;overflow:hidden;min-height:0}
.bpmn-palette{width:114px;min-width:114px;background:var(--sur);border-right:1px solid var(--bdr);overflow-y:auto;padding:8px 6px;display:flex;flex-direction:column;gap:2px}
.pal-section{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--t3);padding:6px 4px 4px;margin-top:4px}
.pal-section:first-child{margin-top:0}
.pal-item{display:flex;align-items:center;gap:6px;padding:6px 7px;border-radius:6px;cursor:pointer;transition:background var(--tr),border-color var(--tr);border:1px solid transparent;font-size:11px;color:var(--t2)}
.pal-item:hover{background:var(--sur2);border-color:var(--bdr);color:var(--t1)}
.pal-item.placing{background:var(--accent-bg);border-color:rgba(232,137,42,.35);color:var(--accent)}
.pal-icon{width:28px;height:28px;min-width:28px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.bpmn-canvas-wrap{flex:1;overflow:auto;position:relative;background:#f8f7f4;cursor:default}
.bpmn-canvas-wrap.placing{cursor:crosshair}
.bpmn-canvas-wrap.connecting{cursor:cell}
#bpmn-label-inp{position:fixed;z-index:9999;display:none;font-family:'IBM Plex Sans',sans-serif;font-size:13px;text-align:center;background:white;border:2px solid var(--accent);border-radius:6px;outline:none;padding:5px 8px;box-shadow:0 4px 16px rgba(0,0,0,.18);min-width:80px}

/* BPMN Right Panel */
.map-info-panel{width:258px;min-width:258px;background:var(--sur);border-left:1px solid var(--bdr);display:flex;flex-direction:column;overflow-y:auto;min-height:0}
.mip-section{padding:14px 14px 0;border-bottom:1px solid var(--bdr)}
.mip-section:last-child{border-bottom:none;flex:1;overflow-y:auto;padding-bottom:14px}
.mip-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--t3);margin-bottom:10px}
.mip-field{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.mip-field label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--t3)}
.mip-field input,.mip-field select{height:30px;background:var(--sur2);border:1px solid var(--bdr);border-radius:var(--r);padding:0 9px;font-size:12px;color:var(--t1);outline:none;font-family:inherit;transition:border-color var(--tr)}
.mip-field input:focus,.mip-field select:focus{border-color:var(--accent)}
.mip-date{font-size:12px;color:var(--t2)}
.mip-date span{color:var(--t3)}
.mip-act-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--bdr)}
.mip-act-row:last-child{border-bottom:none}
.mip-act-name{flex:1;font-size:12px;color:var(--t1);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mip-act-setor{font-size:10px;color:var(--t3);flex-shrink:0}
.mip-act-rm{background:none;border:none;cursor:pointer;color:var(--t3);display:flex;padding:2px;border-radius:3px;transition:color var(--tr)}
.mip-act-rm:hover{color:var(--err)}
.mip-act-add{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--accent);cursor:pointer;background:none;border:none;font-family:inherit;padding:8px 0 0;transition:color var(--tr)}
.mip-act-add:hover{color:var(--accent-dark)}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.38);z-index:300;display:flex;align-items:center;justify-content:center;animation:fadeIn .15s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--sur);border-radius:var(--rl);width:470px;max-height:74vh;display:flex;flex-direction:column;box-shadow:var(--shadow-lg);animation:slideUp .18s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--bdr)}
.modal-hdr h2{font-size:15px;font-weight:600;color:var(--t1)}
.modal-close{background:none;border:none;cursor:pointer;color:var(--t2);font-size:20px;display:flex;padding:2px;border-radius:5px;transition:background var(--tr)}
.modal-close:hover{background:var(--sur2)}
.modal-body{flex:1;overflow-y:auto;padding:4px 0}
.modal-row{display:flex;align-items:flex-start;gap:10px;padding:11px 18px;border-bottom:1px solid var(--bdr)}
.modal-row:last-child{border-bottom:none}
.modal-num{font-size:12px;color:var(--t3);font-weight:600;min-width:20px;padding-top:1px}
.modal-row-name{font-size:13px;color:var(--t1);font-weight:500}
.modal-row-sub{font-size:12px;color:var(--t3);margin-top:2px}

/* ── PLACEHOLDER ── */
.placeholder-tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--t3);overflow:auto;padding:20px}
.placeholder-tab i{font-size:52px;opacity:.3}
.placeholder-tab h2{font-size:16px;font-weight:500;color:var(--t2)}
.placeholder-tab p{font-size:13px;max-width:290px;text-align:center;line-height:1.6}
.btn-outline{margin-top:6px;padding:8px 20px;background:none;color:var(--accent);border:1px solid var(--accent);border-radius:var(--r);cursor:pointer;font-size:13px;font-family:inherit;font-weight:500;transition:background var(--tr),color var(--tr)}
.btn-outline:hover{background:var(--accent);color:#fff}

/* ── BTX AUTOMATION TRACE ── */
.btx-auto-section{background:linear-gradient(135deg,#f8f4ff 0%,#f0f5ff 100%);border:1px solid #d4c5f9}
.btx-auto-section .btx-checklist-hdr i{color:#5b2d91}
.auto-tool{display:inline-flex;align-items:center;gap:6px;background:#5b2d91;color:#fff;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;margin-bottom:10px}
.auto-trigger{background:#fff;border:1px solid #d4c5f9;border-radius:var(--r);padding:10px 13px;margin-bottom:12px;font-size:13px;color:var(--t1);display:flex;align-items:flex-start;gap:8px}
.auto-trigger i{font-size:16px;color:#5b2d91;flex-shrink:0;margin-top:1px}
.auto-actions{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.auto-action-row{display:flex;align-items:center;gap:10px;padding:8px 12px;background:#fff;border:1px solid #e8e0f9;border-radius:var(--r)}
.auto-action-row i{font-size:15px;color:#5b2d91;flex-shrink:0}
.auto-action-row span{font-size:13px;color:var(--t1)}
.auto-path{display:flex;flex-direction:column;gap:0;margin-top:4px}
.auto-path-node{display:flex;align-items:center;gap:10px;padding:9px 13px;border-radius:var(--r);font-size:12px;font-weight:500}
.auto-path-node.trigger-node{background:#e8f5ec;color:var(--ok);border:1px solid #b7dfbf}
.auto-path-node.task-node{background:#e6f0fb;color:#1a5fa8;border:1px solid #b8d4f5}
.auto-path-node.flow-node{background:rgba(232,137,42,.08);color:var(--accent-dark);border:1px solid rgba(232,137,42,.25)}
.auto-path-node.cond-node{background:#fef9e7;color:#b45309;border:1px solid #fde68a}
.auto-path-arrow{display:flex;align-items:center;padding:3px 0 3px 21px;color:var(--t3);font-size:18px;line-height:1}
.auto-section-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:#5b2d91;margin-bottom:6px}

.btx-det-wrap{flex:1;display:flex;gap:0;overflow:hidden;min-height:0}
.btx-det-main{flex:1;overflow-y:auto;min-width:0;padding:0}
.btx-det-side{width:260px;min-width:260px;border-left:1px solid var(--bdr);overflow-y:auto;background:var(--sur);padding:0}
.btx-section{padding:18px 20px;border-bottom:1px solid var(--bdr)}
.btx-section:last-child{border-bottom:none}
.btx-task-title{font-size:17px;font-weight:600;color:var(--t1);line-height:1.35;margin-bottom:0;outline:none;width:100%;background:none;border:none;font-family:inherit;resize:none;padding:0}
.btx-task-title:focus{outline:2px solid var(--accent);outline-offset:2px;border-radius:4px}
.btx-field-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--t3);margin-bottom:8px}
.btx-rich-area{font-size:13px;color:var(--t1);line-height:1.75;outline:none;min-height:60px;border-radius:var(--r);padding:8px 10px;margin:-8px -10px}
.btx-rich-area[contenteditable=true]{background:var(--sur2);border:1px solid var(--bdr)}
.btx-rich-area[contenteditable=true]:focus{border-color:var(--accent)}
.btx-rich-area:empty::before{content:attr(data-ph);color:var(--t3);pointer-events:none}
.btx-side-row{display:flex;align-items:center;padding:12px 16px;border-bottom:1px solid var(--bdr);font-size:13px;gap:10px}
.btx-side-row:last-child{border-bottom:none}
.btx-side-key{color:var(--t3);font-size:12px;width:96px;flex-shrink:0}
.btx-side-val{color:var(--t1);font-weight:500;flex:1;min-width:0}
.btx-side-val input,.btx-side-val select{width:100%;background:none;border:none;outline:none;font-size:13px;color:var(--t1);font-family:inherit;font-weight:500}
.btx-side-val input:focus,.btx-side-val select:focus{background:var(--sur2);border:1px solid var(--accent);border-radius:4px;padding:1px 5px}
/* checklist */
.btx-checklist-hdr{display:flex;align-items:center;gap:8px;margin-bottom:10px;cursor:pointer;user-select:none}
.btx-checklist-hdr i{font-size:16px;color:var(--accent)}
.btx-checklist-title{font-size:13px;font-weight:600;color:var(--t1);flex:1}
.btx-checklist-prog{font-size:11px;color:var(--t3)}
.btx-progress{height:3px;background:var(--sur3);border-radius:2px;margin-bottom:12px;overflow:hidden}
.btx-progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s ease}
.btx-check-item{display:flex;align-items:flex-start;gap:10px;padding:6px 0;border-bottom:1px solid var(--bdr)}
.btx-check-item:last-child{border-bottom:none}
.btx-check-item input[type=checkbox]{margin-top:2px;cursor:pointer;accent-color:var(--accent);flex-shrink:0;width:15px;height:15px}
.btx-check-item input[type=checkbox]:disabled{cursor:default}
.btx-check-text{flex:1;font-size:13px;color:var(--t1);line-height:1.45;outline:none}
.btx-check-text.done{text-decoration:line-through;color:var(--t3)}
.btx-add-check{display:flex;align-items:center;gap:6px;padding:8px 0 0;font-size:12px;color:var(--accent);cursor:pointer;background:none;border:none;font-family:inherit}
.btx-add-check:hover{color:var(--accent-dark)}
/* notification banner */
.btx-notif{display:flex;align-items:center;gap:10px;padding:10px 16px;background:#e8f5ec;border-bottom:1px solid #b7dfbf;font-size:13px;color:var(--ok);font-weight:500;flex-shrink:0;animation:slideIn .2s ease}
.btx-notif i{font-size:18px}
.btx-notif-close{margin-left:auto;background:none;border:none;cursor:pointer;color:var(--ok);font-size:16px;padding:0}
/* edit overlay badge */
.btx-edit-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;background:#fff8e1;color:#b45309;padding:3px 10px;border-radius:20px;border:1px solid #fde68a}

.btx-status{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:500;padding:3px 9px;border-radius:20px}
.btx-status.pendente{background:#f1f5f9;color:#475569}
.btx-status.em_andamento{background:#e6f0fb;color:#1a5fa8}
.btx-status.concluido{background:var(--ok-bg);color:var(--ok)}
.btx-status.atrasado{background:var(--err-bg);color:var(--err)}
.btx-auto-y{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:500;background:#f2ecfb;color:#5b2d91;padding:2px 8px;border-radius:20px}
.btx-auto-n{display:inline-flex;align-items:center;gap:3px;font-size:11px;color:var(--t3);background:var(--sur3);padding:2px 8px;border-radius:20px}
/* kanban */
.btx-board{display:flex;gap:12px;padding:16px;overflow-x:auto;min-height:0;flex:1;align-items:flex-start}
.btx-col{width:240px;min-width:240px;background:var(--sur2);border-radius:var(--rl);border:1px solid var(--bdr);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.btx-col-hdr{padding:11px 14px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;background:var(--sur)}
.btx-col-hdr h3{font-size:12px;font-weight:600;color:var(--t1)}
.btx-col-count{font-size:11px;font-weight:600;padding:2px 7px;border-radius:10px;background:var(--sur2);color:var(--t2)}
.btx-col-body{padding:8px;display:flex;flex-direction:column;gap:7px;overflow-y:auto;max-height:460px}
.btx-card{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);padding:11px 12px;cursor:pointer;transition:border-color var(--tr),box-shadow var(--tr)}
.btx-card:hover{border-color:var(--bdr2);box-shadow:0 2px 8px rgba(0,0,0,.06)}
.btx-card-name{font-size:12px;font-weight:600;color:var(--t1);margin-bottom:5px;line-height:1.35}
.btx-card-fluxo{font-size:11px;color:var(--accent);margin-bottom:5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.btx-card-meta{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-top:6px}
.btx-card-resp{font-size:10px;font-weight:500;background:var(--sur2);color:var(--t2);padding:2px 7px;border-radius:10px}
.btx-card-prazo{font-size:10px;color:var(--t3)}
.btx-card-prazo.late{color:var(--err);font-weight:600}
.btx-detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btx-descr{font-size:13px;color:var(--t1);line-height:1.7;background:var(--sur2);border-radius:var(--r);padding:12px 14px;border:1px solid var(--bdr)}
.view-toggle{display:flex;background:var(--sur2);border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden;flex-shrink:0}
.vtbtn{padding:5px 12px;font-size:12px;color:var(--t2);cursor:pointer;border:none;background:none;font-family:inherit;display:flex;align-items:center;gap:4px;transition:background var(--tr),color var(--tr)}
.vtbtn:hover{background:var(--sur3);color:var(--t1)}
.vtbtn.active{background:var(--sur);color:var(--accent);font-weight:500;box-shadow:inset 0 0 0 1px var(--bdr)}

.aprov-status{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:500;padding:3px 9px;border-radius:20px}
.aprov-status.pendente{background:#fff8e1;color:#b45309}
.aprov-status.aprovado{background:var(--ok-bg);color:var(--ok)}
.aprov-status.rejeitado{background:var(--err-bg);color:var(--err)}
.change-block{border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden;margin-bottom:10px}

<script>
/* ============================================================  SUPABASE  */
const SUPA_URL='https://pmmvlcjzngzlggfsygsd.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBtbXZsY2p6bmd6bGdnZnN5Z3NkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3NTYyNjUsImV4cCI6MjA5NDMzMjI2NX0.oPqk4tN1UlktC5dQulA2uO08wsa9eJgP3P76Vo3Yf0Y';
const db=(typeof supabase!=='undefined')?supabase.createClient(SUPA_URL,SUPA_KEY):null;

function parseDateBR(s){if(!s||s==='—')return null;const p=s.split('/');return p.length===3?p[2]+'-'+p[1]+'-'+p[0]:null;}
function parseDateISO(s){if(!s)return'—';const p=s.split('-');return p.length===3?p[2]+'/'+p[1]+'/'+p[0]:'—';}

async function dbUpsert(table,data){
  if(!db)return;
  const {error}=await db.from(table).upsert(data,{onConflict:'id'});
  if(error)console.warn('[Supabase]',table,error.message);
}
async function dbSaveAtividade(a){
  await dbUpsert('atividades',{
    id:a.id,atividade:a.atividade,setor:a.setor,cargo:a.cargo,
    video_vimeo_id:a.video||null,processo:a.processo,macroprocesso:a.macroprocesso,
    subprocesso:a.subprocesso,abordagem:a.abordagem,
    proxima_revisao:parseDateBR(a.proximaRevisao)
  });
}
async function dbSavePolitica(p){
  await dbUpsert('politicas',{
    id:p.id,nome:p.nome,setor:p.setor,responsavel:p.responsavel,
    conteudo_html:p.conteudo||null,pendente:!!p._pendente,
    is_new:!!p._isNew,aprovado:!!p._aprovado,
    proxima_revisao:parseDateBR(p.proximaRevisao)
  });
}
async function dbSaveManual(m){
  await dbUpsert('manuais',{
    id:m.id,nome:m.nome,setor:m.setor,responsavel:m.responsavel,
    conteudo_html:m.conteudo||null,pendente:!!m._pendente,is_new:!!m._isNew,
    proxima_revisao:parseDateBR(m.proximaRevisao)
  });
}
async function dbSaveMapeamento(m){
  await dbUpsert('mapeamentos',{
    id:m.id,nome:m.nome,setor:m.setor||null,
    texto_fluxo:m.texto||null,ultima_alteracao:parseDateBR(m.ultimaAlteracao)
  });
}
async function dbSaveAprovacao(p){
  await dbUpsert('aprovacoes',{
    id:p.id,atividade_id:p.ativId,autor:p.autor,
    data_edicao:parseDateBR(p.dataEdicao),status:p.status||'pendente'
  });
  for(const c of(p.changes||[])){
    await dbUpsert('aprovacao_changes',{
      id:c.cid,aprovacao_id:p.id,tipo:c.tipo,campo:c.campo,
      label:c.label,antes:c.antes,depois:c.depois,
      c_status:c.cStatus||'pendente',reject_comment:c.rejectComment||null
    });
  }
}
async function dbSaveFluxo(f){
  await dbUpsert('fluxos_bitrix',{
    id:f.id,nome:f.nome,prazo:parseDateBR(f.prazo),
    atribuicao:f.atribuicao||'manual',responsavel:f.responsavel||null,
    projeto:f.projeto||null,tarefa_modelo_id:f.tarefaModeloId||null
  });
}
async function dbLoadColaboradores(){
  if(!db)return;
  const {data,error}=await db.from('colaboradores').select('nome,email,cargo,setor').order('nome');
  if(data&&data.length>0){
    window.COLABORADORES=data.map(c=>({nome:c.nome,email:c.email||'',cargo:c.cargo||'',setor:c.setor||''}));
    if(S.tab==='agenda')buildContent();
  }

   conteudo:`<h1>Política de Descontos Comerciais</h1>
<blockquote><b>Objetivo:</b> Definir os limites e critérios para concessão de descontos comerciais pela equipe de vendas, garantindo a margem mínima da empresa e o alinhamento estratégico com as diretrizes da diretoria.</blockquote>
<h2>1. Aplicação e Responsabilidades</h2>
<p>Esta política aplica-se a todos os colaboradores da área comercial que realizam negociações com clientes. O cumprimento é de responsabilidade do vendedor, com supervisão do gerente comercial.</p>
<h2>2. Limites de Desconto</h2>
<p>Os descontos comerciais seguem a tabela abaixo, conforme o cargo do solicitante:</p>
<h3>2.1 Vendedor</h3>
<p>Pode conceder descontos de até <b>10%</b> sem necessidade de aprovação, desde que a margem mínima do produto seja respeitada.</p>
<h3>2.2 Gerente Comercial</h3>
<p>Pode aprovar descontos entre <b>10% e 15%</b>. Requer registro da justificativa no sistema CRM.</p>
<h3>2.3 Diretoria</h3>
<p>Descontos acima de <b>15%</b> requerem aprovação formal da diretoria, com apresentação de análise de margem e justificativa estratégica.</p>
<h2>3. Regras Gerais</h2>
<p>Todo desconto acima de 10% deve ser registrado no Bitrix24 através da tarefa de aprovação. O desconto só pode ser comunicado ao cliente após aprovação formal.</p>
<p>É <b>vedado</b> conceder descontos que comprometam a margem mínima estabelecida no precificador, independentemente do nível hierárquico.</p>
<h2>4. Disposições Finais</h2>
<p>Esta política entra em vigor na data de sua publicação e deve ser revisada semestralmente ou sempre que houver alteração na estratégia comercial da empresa.</p>`},

  {id:2,nome:'Política de Atendimento ao Cliente',setor:'SAC',responsavel:'Coordenador de SAC',
   dataCriacao:'15/01/2025',ultimaAlteracao:'15/04/2026',proximaRevisao:'15/10/2026',
   atividades:[1,4],
   conteudo:`<h1>Política de Atendimento ao Cliente</h1>
<blockquote><b>Objetivo:</b> Estabelecer os padrões mínimos de qualidade no atendimento ao cliente, garantindo respostas ágeis, postura profissional e resolução efetiva das demandas.</blockquote>
<h2>1. Canais de Atendimento</h2>
<p>O atendimento ao cliente é realizado pelos seguintes canais oficiais: telefone, e-mail, WhatsApp e portal do cliente. Todos os contatos devem ser registrados no sistema CRM.</p>
<h2>2. Prazos de Resposta</h2>
<h3>2.1 Primeiro contato</h3>
<p>O cliente deve receber retorno em até <b>24 horas úteis</b> após o primeiro contato, independentemente do canal utilizado.</p>
<h3>2.2 Resolução de reclamações</h3>
<p>Reclamações devem ser resolvidas em até <b>5 dias úteis</b>. Casos que exijam análise técnica ou financeira podem ser prorrogados por mais 3 dias, com comunicação ao cliente.</p>
<h2>3. Padrões de Comunicação</h2>
<p>Toda comunicação com o cliente deve ser <b>cordial, objetiva e profissional</b>. É proibido o uso de linguagem informal, jargões técnicos sem explicação ou qualquer forma de descaso.</p>
<h2>4. Escalonamento</h2>
<p>Quando o atendente não conseguir resolver a demanda no prazo, deve escalonar para o coordenador de SAC, registrando o motivo no CRM. O cliente deve ser informado do escalonamento.</p>
<h2>5. NPS e Qualidade</h2>
<p>A meta mínima de NPS é <b>70</b>. Pesquisas de satisfação são enviadas automaticamente após o fechamento de cada atendimento. Resultados abaixo de 50 devem ser analisados individualmente.</p>
<h2>6. Disposições Finais</h2>
<p>Esta política é revisada semestralmente. Descumprimento reiterado implica em advertência e treinamento obrigatório.</p>`},

  {id:3,nome:'Política de Crédito e Cobrança',setor:'Financeiro',responsavel:'Coordenador Financeiro',
   dataCriacao:'08/05/2026',ultimaAlteracao:'08/05/2026',proximaRevisao:'08/11/2026',
   _pendente:true,_isNew:true,
   atividades:[3,5],
   conteudo:`<h1>Política de Crédito e Cobrança</h1>
<blockquote><b>Objetivo:</b> Definir os critérios para aprovação de crédito a clientes e estabelecer o processo de cobrança para inadimplentes, garantindo a saúde financeira da empresa.</blockquote>
<h2>1. Análise de Crédito</h2>
<p>Todo novo cliente deve passar por análise de crédito antes da liberação do primeiro pedido a prazo. A análise considera: histórico de pagamento, consulta ao SERASA, tempo de atividade da empresa e referências comerciais.</p>
<h2>2. Limites de Crédito</h2>
<h3>2.1 Clientes novos</h3>
<p>Limite inicial de <b>R$ 5.000,00</b>, revisável após 3 meses de relacionamento sem inadimplência.</p>
<h3>2.2 Revisão de limite</h3>
<p>A revisão de limite pode ser solicitada pelo vendedor após 90 dias de bom histórico. Aprovada pelo coordenador financeiro.</p>
<h2>3. Processo de Cobrança</h2>
<h3>3.1 Até 5 dias de atraso</h3>
<p>Envio automático de notificação por e-mail pelo sistema ERP.</p>
<h3>3.2 De 6 a 15 dias</h3>
<p>Contato telefônico pelo financeiro. Registro obrigatório no Bitrix24.</p>
<h3>3.3 Acima de 15 dias</h3>
<p>Bloqueio automático do cliente para novos pedidos. Encaminhamento ao jurídico se não houver acordo.</p>
<h2>4. Inadimplência Tolerada</h2>
<p>A inadimplência máxima tolerada na carteira é de <b>5%</b>. Acima desse índice, reunião obrigatória com a diretoria financeira.</p>
<h2>5. Disposições Finais</h2>
<p>Esta política é revisada semestralmente ou sempre que o índice de inadimplência ultrapassar 3% da carteira.</p>`},

  {id:4,nome:'Política de Recursos Humanos',setor:'RH',responsavel:'Gerente de RH',
   dataCriacao:'01/02/2025',ultimaAlteracao:'10/04/2026',proximaRevisao:'01/10/2026',
   _pendente:false,_aprovado:true,
   atividades:[6,8],
   conteudo:`<h1>Política de Recursos Humanos</h1>
<blockquote><b>Objetivo:</b> Regulamentar os processos de gestão de pessoas da Comercial Mariano, promovendo um ambiente de trabalho saudável, produtivo e alinhado aos valores da empresa.</blockquote>
<h2>1. Admissão e Integração</h2>
<p>Todo novo colaborador deve passar pelo processo de integração (onboarding) nos primeiros 5 dias úteis. O programa cobre cultura organizacional, ferramentas, processos internos e código de conduta.</p>
<h2>2. Avaliação de Desempenho</h2>
<h3>2.1 Frequência</h3>
<p>A avaliação é realizada <b>semestralmente</b>: em Junho e Dezembro de cada ano.</p>
<h3>2.2 Critérios</h3>
<p>Os critérios avaliados incluem: cumprimento de metas, competências comportamentais, trabalho em equipe e aderência aos processos internos.</p>
<h2>3. Benefícios</h2>
<p>Os benefícios oferecidos incluem: vale-refeição, vale-transporte, plano de saúde (após 3 meses), seguro de vida e participação nos resultados (PPR).</p>
<h2>4. Código de Conduta</h2>
<p>Todos os colaboradores devem zelar pelo bom nome da empresa, respeitar colegas e clientes, e agir com ética e transparência em todas as situações profissionais.</p>
<p>São <b>motivos de demissão por justa causa</b>: desvio de mercadorias, assédio moral ou sexual, divulgação de informações confidenciais e falsificação de documentos.</p>
<h2>5. Diversidade e Inclusão</h2>
<p>A Comercial Mariano é comprometida com a diversidade. Não são toleradas discriminações por gênero, raça, religião, orientação sexual, deficiência ou qualquer outra característica pessoal.</p>
<h2>6. Disposições Finais</h2>
<p>Esta política é revisada anualmente e sempre que houver alteração na legislação trabalhista aplicável.</p>`},
];

let MANUAIS=[
  {id:1,nome:'Manual de Prospecção Ativa',setor:'Comercial',responsavel:'Gerente Comercial',
   dataCriacao:'10/01/2025',ultimaAlteracao:'02/05/2026',proximaRevisao:'02/11/2026',
   atividades:[1,2],
   conteudo:`<h1>Manual de Prospecção Ativa</h1>
<blockquote><b>Objetivo:</b> Orientar o vendedor sobre o processo completo de prospecção ativa de clientes, desde a qualificação do lead até o registro do contato no CRM.</blockquote>
<h2>1. Antes de Prospectar</h2>
<p>Verifique se o lead está dentro do perfil de cliente ideal (ICP) antes de iniciar qualquer contato. Consulte a tabela de ICP disponível no CRM e confirme que o lead atende aos critérios de setor, porte e localização.</p>
<h3>1.1 Critérios de ICP</h3>
<p>O lead deve atender ao menos <b>3 dos 5 critérios</b> definidos no ICP vigente. Em caso de dúvida, consulte o gerente comercial antes de prosseguir.</p>
<h2>2. Roteiro de Abordagem</h2>
<p>Utilize o roteiro padrão de abordagem disponível na pasta compartilhada. O roteiro deve ser adaptado ao perfil do lead, mas os pontos principais devem ser mantidos:</p>
<ul>
  <li>Apresentação pessoal e da empresa (máx. 30 segundos)</li>
  <li>Identificação da dor ou necessidade do lead</li>
  <li>Proposta de valor inicial</li>
  <li>Convite para reunião ou demonstração</li>
</ul>
<h2>3. Registro no CRM</h2>
<p>Todo contato realizado deve ser registrado no CRM <b>imediatamente após a ligação</b>, com o resultado (interessado, sem interesse, retornar, não atendeu) e as próximas ações previstas.</p>
<h3>3.1 Campos obrigatórios</h3>
<p>Nome do contato, cargo, empresa, telefone, resultado da abordagem, próxima ação e data do próximo contato.</p>
<h2>4. Boas Práticas</h2>
<p>Prospecte nos horários de maior assertividade: <b>terças, quartas e quintas das 9h às 11h e das 14h às 16h</b>. Evite ligar às segundas de manhã e às sextas à tarde.</p>`},

  {id:2,nome:'Manual de Emissão de Nota Fiscal',setor:'Financeiro',responsavel:'Coordenador Financeiro',
   dataCriacao:'15/01/2025',ultimaAlteracao:'20/04/2026',proximaRevisao:'20/10/2026',
   atividades:[3],
   conteudo:`<h1>Manual de Emissão de Nota Fiscal</h1>
<blockquote><b>Objetivo:</b> Padronizar o processo de emissão de nota fiscal eletrônica (NF-e) após confirmação de pagamento ou aprovação do pedido, garantindo conformidade fiscal e rastreabilidade no ERP.</blockquote>
<h2>1. Pré-requisitos</h2>
<p>Antes de emitir a NF-e, verifique:</p>
<ul>
  <li>Pagamento confirmado no sistema financeiro</li>
  <li>Dados do cliente atualizados no cadastro (CNPJ, endereço, IE)</li>
  <li>Número do pedido registrado no ERP</li>
  <li>Alíquotas fiscais validadas pelo contador</li>
</ul>
<h2>2. Passo a Passo de Emissão</h2>
<h3>2.1 Acesso ao sistema</h3>
<p>Acesse o módulo de faturamento no ERP Sapiens com seu usuário e senha. Em caso de bloqueio de acesso, acione o suporte de TI.</p>
<h3>2.2 Preenchimento</h3>
<p>Preencha todos os campos obrigatórios: destinatário, CFOP, NCM, quantidade, valor unitário, valor total, tributos (ICMS, PIS, COFINS). Confira os dados antes de transmitir.</p>
<h3>2.3 Transmissão</h3>
<p>Transmita a NF-e para a SEFAZ e aguarde o retorno de autorização. Em caso de rejeição, corrija os erros indicados e retransmita.</p>
<h2>3. Após a Emissão</h2>
<p>Vincule o número da NF-e ao pedido no ERP e envie o XML e o DANFE ao cliente por e-mail em até <b>2 horas</b> após a autorização.</p>
<h2>4. Tratamento de Erros</h2>
<p>Em caso de erros recorrentes na transmissão ou divergências fiscais, acione imediatamente o coordenador financeiro e o contador responsável antes de qualquer nova tentativa.</p>`},

  {id:3,nome:'Manual de Gestão de Inadimplência',setor:'Financeiro',responsavel:'Coordenador Financeiro',
   dataCriacao:'05/03/2025',ultimaAlteracao:'10/04/2026',proximaRevisao:'10/10/2026',
   atividades:[5],
   conteudo:`<h1>Manual de Gestão de Inadimplência</h1>
<blockquote><b>Objetivo:</b> Definir o passo a passo para tratativa de clientes inadimplentes, desde a notificação automática até o encaminhamento ao jurídico.</blockquote>
<h2>1. Régua de Cobrança</h2>
<p>A régua de cobrança define as ações a serem tomadas em cada etapa do atraso:</p>
<h3>1.1 Até 5 dias</h3>
<p>O sistema ERP envia automaticamente um e-mail de lembrete de vencimento com o boleto atualizado. Nenhuma ação manual é necessária.</p>
<h3>1.2 De 6 a 15 dias</h3>
<p>O financeiro realiza contato telefônico. Registre a tentativa de contato no Bitrix24 com data, horário e resultado. Negocie nova data de pagamento se necessário.</p>
<h3>1.3 De 16 a 30 dias</h3>
<p>Bloqueio automático do cliente para novos pedidos. Envio de notificação formal por e-mail com prazo de 5 dias para regularização.</p>
<h3>1.4 Acima de 30 dias</h3>
<p>Encaminhamento ao jurídico com toda a documentação: contrato, NF-e, registros de cobrança e histórico de contatos.</p>
<h2>2. Negociação</h2>
<p>Parcelamentos de dívidas devem ser aprovados pelo coordenador financeiro. O máximo permitido é de <b>3 parcelas</b> sem acréscimo. Acima disso, aplicar juros conforme política de crédito.</p>
<h2>3. Documentação</h2>
<p>Toda negociação formalizada deve ser registrada em contrato aditivo ou termo de confissão de dívida, assinado pelas partes.</p>`},

  {id:4,nome:'Manual de Treinamento e Integração',setor:'RH',responsavel:'Gerente de RH',
   dataCriacao:'01/04/2025',ultimaAlteracao:'01/04/2026',proximaRevisao:'01/10/2026',
   atividades:[8],
   conteudo:`<h1>Manual de Treinamento e Integração</h1>
<blockquote><b>Objetivo:</b> Garantir que todo novo colaborador tenha uma experiência de integração completa, absorvendo a cultura, os processos e as ferramentas da Comercial Mariano nos primeiros dias.</blockquote>
<h2>1. Cronograma de Integração</h2>
<p>O programa de integração tem duração de <b>5 dias úteis</b> e é conduzido pelo RH em parceria com o gestor da área.</p>
<h3>Dia 1 — Boas-vindas</h3>
<p>Apresentação da empresa, missão, visão e valores. Tour pelas instalações. Entrega de equipamentos, crachá e acesso aos sistemas.</p>
<h3>Dia 2 — Processos e Ferramentas</h3>
<p>Apresentação do ERP, Bitrix24 e demais ferramentas. Overview dos principais processos do departamento.</p>
<h3>Dia 3 e 4 — Imersão na Área</h3>
<p>O colaborador acompanha o gestor e colegas nas atividades do dia a dia. Dúvidas são registradas para esclarecimento.</p>
<h3>Dia 5 — Alinhamento</h3>
<p>Reunião de feedback com RH e gestor. Definição de metas dos primeiros 90 dias e próximos passos.</p>
<h2>2. Documentação</h2>
<p>Ao final da integração, o colaborador assina o termo de ciência dos processos e políticas internas. O RH arquiva o documento no sistema.</p>
<h2>3. Acompanhamento</h2>
<p>O gestor realiza check-ins semanais durante os primeiros 90 dias. Resultados são registrados no sistema de RH para avaliação do período de experiência.</p>`},
];

function buildSidebar(){
  const isBtxActive=S.tab==='bitrix'||S.tab==='bitrix-fluxo';
  const subOpen=isBtxActive||S.btxSubOpen;
  document.getElementById('sb-nav').innerHTML=NAV.map(n=>{
    if(n.id==='bitrix'){
      return '<div class="nav-item'+(isBtxActive?' active':'')+(subOpen?' sub-open':'')+'" onclick="event.stopPropagation();toggleBtxSub()" style="user-select:none">'
        +'<i class="ti '+n.icon+'"></i>'
        +'<span class="nav-label">'+n.label+'</span>'

        +'<div class="nav-sub-item'+(S.tab==='bitrix-fluxo'?' active':'')+'" onclick="event.stopPropagation();goTab(\'bitrix-fluxo\')">'
        +'<i class="ti ti-git-branch" style="font-size:14px"></i><span class="nav-label"> Fluxo</span></div>'
        +'</div>';
    }
    return '<div class="nav-item'+(S.tab===n.id?' active':'')+'" onclick="goTab(\''+n.id+'\')"> '
      +(n.id==='painel'?'<img src="'+PAINEL_ICON+'" class="painel-custom-icon" alt="Painel">'

}

function buildContent(){
  const el=document.getElementById('content');
  if(S.tab==='painel'){el.innerHTML=painelHTML();return}
  if(S.tab==='atividades'){el.innerHTML=ativHTML();buildAtivTable();return}
  if(S.tab==='politicas'){el.innerHTML=politicasHTML();return}
  if(S.tab==='manuais'){el.innerHTML=manuaisHTML();return}
  if(S.tab==='mapeamento'){el.innerHTML=mapHTML();if(S.mapDetailId)setTimeout(()=>BE.init(S.mapDetailId),30);return}
  if(S.tab==='videos'){el.innerHTML=videoHTML();return}
  if(S.tab==='aprovacao'){el.innerHTML=aprovHTML();return}
  if(S.tab==='solicitacoes'){el.innerHTML=solicitHTML();return}
  if(S.tab==='agenda'){el.innerHTML=agendaHTML();return}
  if(S.tab==='bitrix'){el.innerHTML=bitrixHTML();return}
  if(S.tab==='bitrix-fluxo'){el.innerHTML=bitrixFluxoHTML();return}
  const META={
    videos:{icon:'ti-video',h:'Vídeos',p:'Biblioteca centralizada de vídeos vinculados às atividades.'},
    aprovacao:{icon:'ti-circle-check',h:'Aprovação',p:'Fluxos de aprovação pendentes e histórico de aprovações.'},
    solicitacoes:{icon:'ti-send',h:'Solicitações Enviadas',p:'Acompanhe solicitações enviadas e seu status atual.'},
    bitrix:{icon:'ti-subtask',h:'Bitrix',p:'Integração com o Bitrix24 para gestão de tarefas vinculadas.'},
    'bitrix-fluxo':{icon:'ti-git-branch',h:'Fluxo',p:'Fluxos de automação e processos do Bitrix24.'},
  };
  const m=META[S.tab]||{icon:'ti-layout-dashboard',h:'Em breve',p:''};
  el.innerHTML=`<div class="placeholder-tab"><i class="ti ${m.icon}"></i><h2>${m.h}</h2><p>${m.p}</p><button class="btn-outline">Em construção</button></div>`;
}

/* Rebuild preserving scroll position of all scrollable panels */
function rebuildKeepScroll(){
  const scrollables=['.det-body','.vid-scroll-body','.painel-body','.ativ-table-wrap','.map-body'];
  const saved={};
  scrollables.forEach(sel=>{
    const el=document.querySelector(sel);
    if(el&&el.scrollTop>0) saved[sel]=el.scrollTop;
  });
  buildContent();
  requestAnimationFrame(()=>{
    Object.entries(saved).forEach(([sel,top])=>{
      const el=document.querySelector(sel);
      if(el) el.scrollTop=top;
    });
  });
}

/* ============================================================  PAINEL  */
function painelHTML(){
  const today=new Date();
  const totalAtivs=ATIVS.length;
  const totalPols=POLS.length;
  const totalManuais=MANUAIS.length;
  const totalMaps=MAPS.length;
  const totalBtx=BTX.length;
  const totalProc=CARGOS.reduce((s,c)=>s+c.qtd,0);

  // Approval counts
  const pendAtivs=PENDING.filter(p=>p.status==='pendente').length;
  const pendPols=POLS.filter(p=>p._pendente).length;
  const pendMans=MANUAIS.filter(m=>m._pendente).length;
  const pendBtx=BTX_PENDING.filter(p=>p.status==='pendente').length;
  const pendingCount=pendAtivs+pendPols+pendMans+pendBtx;

  // Coverage metrics
  const comVideo=ATIVS.filter(a=>a.video).length;
  const comManual=ATIVS.filter(a=>a.manual).length;
  const comMapa=ATIVS.filter(a=>(a.mapeamento||[]).length>0).length;
  const comPolitica=ATIVS.filter(a=>(a.politicas||[]).length>0).length;
  const covPct=v=>Math.round(v/totalAtivs*100);

  // Revision status
  const semRevisao=ATIVS.filter(a=>{
    if(!a.proximaRevisao)return false;
    const p=a.proximaRevisao.split('/');
    return p.length===3&&new Date(p[2]+'-'+p[1]+'-'+p[0])<today;
  }).length;
  const urgente=ATIVS.filter(a=>{
    if(!a.proximaRevisao)return false;
    const p=a.proximaRevisao.split('/');
    const d=new Date(p[2]+'-'+p[1]+'-'+p[0]);
    const diff=(d-today)/(1000*60*60*24);
    return diff>=0&&diff<=30;
  }).length;

  // Approvals approved vs rejected
  const aprovAprovadas=PENDING.filter(p=>p.status==='aprovado').length;
  const aprovRejeitadas=PENDING.filter(p=>p.status==='rejeitado').length;
  const aprovParcial=PENDING.filter(p=>p.status==='aceito-parcial').length;

  // KPI cards
  const kpis=[
    {label:'Atividades',value:totalAtivs,icon:'ti-checklist',color:'#1565c0',sub:'processos mapeados'},
    {label:'Políticas',value:totalPols,icon:'ti-file-certificate',color:'#2875ca',sub:'documentos ativos'},
    {label:'Manuais',value:totalManuais,icon:'ti-book',color:'#7c3aed',sub:'guias operacionais'},
    {label:'Mapeamentos',value:totalMaps,icon:'ti-git-branch',color:'#0891b2',sub:'fluxos desenhados'},
    {label:'Bitrix',value:totalBtx,icon:'ti-subtask',color:'#0d7b6e',sub:'tarefas modelo'},
    {label:'Aprovações pendentes',value:pendingCount,icon:'ti-clock',color:pendingCount>0?'#b91c1c':'#2e7d45',
     sub:pendingCount>0?'requerem atenção':'tudo em dia',alert:pendingCount>0},
  ];

  const kpiCards=kpis.map(k=>`
    <div class="pi-kpi" style="border-top:3px solid ${k.color}${k.alert?';animation:pulseCard 2s infinite':''}">
      <div class="pi-kpi-icon" style="background:${k.color}18;color:${k.color}">
        <i class="ti ${k.icon}" style="font-size:18px"></i>
      </div>
      <div class="pi-kpi-val" style="color:${k.color}">${k.value}</div>
      <div class="pi-kpi-label">${k.label}</div>
      <div class="pi-kpi-sub" style="color:${k.alert?'#b91c1c':'var(--t3)'}">
        ${k.alert?'<i class="ti ti-alert-triangle" style="font-size:11px"></i>':''}
        ${k.sub}
      </div>
    </div>`).join('');

  // Coverage section
  const covItems=[
    {label:'Com Vídeo',value:comVideo,color:'#1565c0',icon:'ti-video'},
    {label:'Com Manual',value:comManual,color:'#7c3aed',icon:'ti-book'},
    {label:'Com Mapeamento',value:comMapa,color:'#0891b2',icon:'ti-git-branch'},
    {label:'Com Política',value:comPolitica,color:'#2875ca',icon:'ti-file-certificate'},
  ];
  const covRows=covItems.map(c=>{
    const pct=covPct(c.value);
    const missing=totalAtivs-c.value;
    return`<div class="pi-cov-row">
      <div style="width:30px;height:30px;border-radius:8px;background:${c.color}15;display:flex;align-items:center;justify-content:center;flex-shrink:0">
        <i class="ti ${c.icon}" style="font-size:14px;color:${c.color}"></i>
      </div>
      <div class="pi-cov-bar-wrap">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <span style="font-size:12px;font-weight:500;color:var(--t1)">${c.label}</span>
          <span style="font-size:11px;color:var(--t3)">${c.value}/${totalAtivs}</span>
        </div>
        <div class="pi-cov-bar-track"><div class="pi-cov-bar-fill" style="width:${pct}%;background:${c.color}"></div></div>
      </div>
      <div class="pi-cov-pct" style="color:${c.color}">${pct}%</div>
    </div>`;
  }).join('');

  // Pending approvals list
  const pendsPorTipo=[
    {label:'Atividades',n:pendAtivs,color:'#1565c0',icon:'ti-checklist'},
    {label:'Políticas',n:pendPols,color:'#2875ca',icon:'ti-file-certificate'},
    {label:'Manuais',n:pendMans,color:'#7c3aed',icon:'ti-book'},
    {label:'Bitrix',n:pendBtx,color:'#0d7b6e',icon:'ti-subtask'},
  ];
  const pendsPorTipoHTML=pendsPorTipo.filter(x=>x.n>0).map(x=>
    '<div style="display:flex;align-items:center;gap:6px;padding:4px 0">'
    +'<i class="ti '+x.icon+'" style="font-size:12px;color:'+x.color+'"></i>'
    +'<span style="font-size:12px;flex:1">'+x.label+'</span>'
    +'<span style="font-size:12px;font-weight:600;color:'+x.color+'">'+x.n+'</span>'
    +'</div>'
  ).join('')||'<div style="font-size:12px;color:var(--t3)">Nenhum pendente</div>';

  const semCobItems=[
    {label:'Sem vídeo',n:totalAtivs-comVideo,color:'#1565c0',icon:'ti-video-off',tab:'videos'},
    {label:'Sem manual',n:totalAtivs-comManual,color:'#7c3aed',icon:'ti-book-off',tab:'manuais'},
    {label:'Sem mapeamento',n:totalAtivs-comMapa,color:'#0891b2',icon:'ti-git-branch-deleted',tab:'mapeamento'},
    {label:'Sem política',n:totalAtivs-comPolitica,color:'#2875ca',icon:'ti-file-off',tab:'politicas'},
  ];
  const semCobHTML=semCobItems.map(x=>{
    const pct=Math.round(x.n/totalAtivs*100);
    const okColor=x.n===0?'var(--ok)':'#b45309';
    return '<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--bdr);cursor:pointer" onclick="S.tab=\''+x.tab+'\';buildSidebar();buildTopbar();buildContent()" title="Ir para '+x.label+'">'
      +'<div style="width:32px;height:32px;border-radius:8px;background:'+x.color+'12;display:flex;align-items:center;justify-content:center;flex-shrink:0">'
      +'<i class="ti '+x.icon+'" style="font-size:14px;color:'+x.color+'"></i></div>'
      +'<div style="flex:1">'
      +'<div style="font-size:12px;font-weight:500;color:var(--t1)">'+x.label+'</div>'
      +'<div class="pi-bar-track" style="margin-top:4px"><div class="pi-bar-fill" style="width:'+pct+'%;background:'+x.color+'80"></div></div>'
      +'</div>'
      +'<span style="font-size:16px;font-weight:700;color:'+okColor+'">'+x.n+'</span>'
      +'</div>';
  }).join('');
  const pendingAprovs=[
    ...PENDING.filter(p=>p.status==='pendente').map(p=>{const a=ATIVS.find(x=>x.id===p.ativId);return a?{nome:a.atividade,setor:a.setor,tipo:'Atividade',autor:p.autor,data:p.dataEdicao,icon:'ti-checklist',color:'#1565c0'}:null}),
    ...POLS.filter(p=>p._pendente).map(p=>({nome:p.nome,setor:p.setor,tipo:'Política',autor:'—',data:p.ultimaAlteracao,icon:'ti-file-certificate',color:'#2875ca'})),
    ...MANUAIS.filter(m=>m._pendente).map(m=>({nome:m.nome,setor:m.setor,tipo:'Manual',autor:'—',data:m.ultimaAlteracao,icon:'ti-book',color:'#7c3aed'})),
    ...BTX_PENDING.filter(p=>p.status==='pendente').map(p=>{const t=BTX.find(x=>x.id===p.btxId);return t?{nome:t.nome,setor:t.fluxo.split(' - ')[0].replace('Dpto ',''),tipo:'Bitrix',autor:p.autor,data:p.dataEdicao,icon:'ti-subtask',color:'#0d7b6e'}:null}),
  ].filter(Boolean).slice(0,6);

  const aprovRows=pendingAprovs.length
    ?pendingAprovs.map(i=>`<div class="pi-aprov-row" onclick="S.tab='aprovacao';buildSidebar();buildTopbar();buildContent()" style="cursor:pointer">
        <div class="pi-aprov-dot" style="background:${i.color}"></div>
        <div style="flex:1;min-width:0">
          <div style="font-size:12px;font-weight:500;color:var(--t1);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(i.nome)}</div>
          <div style="font-size:11px;color:var(--t3);margin-top:1px;display:flex;align-items:center;gap:4px">
            <i class="ti ${i.icon}" style="font-size:10px;color:${i.color}"></i>
            ${esc(i.tipo)} · ${esc(i.autor!=='—'?i.autor:'')} ${esc(i.data)}

        </div>
        <span class="setor-badge s-${i.setor}" style="font-size:10px;flex-shrink:0">${esc(i.setor)}</span>
      </div>`).join('')
    :`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;color:var(--t3);gap:8px">
        <i class="ti ti-circle-check" style="font-size:32px;color:var(--ok);opacity:.6"></i>
        <span style="font-size:12px">Nenhuma aprovação pendente</span>
      </div>`;

  // Revisions
  const proximasRevisoes=ATIVS.filter(a=>a.proximaRevisao).map(a=>{
    const p=a.proximaRevisao.split('/');
    const d=new Date(p[2]+'-'+p[1]+'-'+p[0]);
    return{...a,_date:d,_diff:Math.round((d-today)/(1000*60*60*24))};
  }).sort((a,b)=>a._date-b._date).slice(0,6);

  const revisaoRows=proximasRevisoes.map(a=>{
    const venc=a._diff<0, urg=a._diff>=0&&a._diff<=7;
    const badge=venc
      ?'<span class="pi-alert-badge">Vencido</span>'
      :urg
        ?`<span class="pi-warn-badge">${a._diff}d</span>`
        :`<span style="font-size:10px;color:var(--t3)">${a._diff}d</span>`;
    return`<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--bdr)">
      <span class="setor-badge s-${a.setor}" style="font-size:10px;flex-shrink:0">${esc(a.setor)}</span>
      <span style="flex:1;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--t1)">${esc(a.atividade)}</span>
      <span style="font-size:11px;color:var(--t3);white-space:nowrap;margin-right:4px">${esc(a.proximaRevisao)}</span>
      ${badge}
    </div>`;
  }).join('');

  // Sector distribution
  const setores=['Comercial','Financeiro','Logística','RH','Gerência','SAC'];
  const setorCounts=setores.map(s=>({s,n:ATIVS.filter(a=>a.setor===s).length})).filter(x=>x.n>0);
  const maxN=Math.max(...setorCounts.map(x=>x.n));
  const setorColors={'Comercial':'#1565c0','Financeiro':'#2875ca','Logística':'#0891b2','RH':'#7c3aed','Gerência':'#3730a3','SAC':'#2e7d45'};

  const setorRows=setorCounts.map(({s,n})=>{
    const color=setorColors[s]||'#888';
    const pct=Math.round(n/totalAtivs*100);
    const barW=Math.round(n/maxN*100);
    return`<div class="pi-dept-row">
      <div class="pi-dept-icon" style="background:${color}18;color:${color}">
        <span style="font-size:12px;font-weight:700">${s.slice(0,2)}</span>
      </div>
      <div style="flex:1;min-width:0">
        <div style="display:flex;justify-content:space-between;margin-bottom:4px">
          <span style="font-size:12px;font-weight:500;color:var(--t1)">${s}</span>
          <span style="font-size:12px;font-weight:600;color:var(--t1)">${n}</span>
        </div>
        <div class="pi-bar-track"><div class="pi-bar-fill" style="width:${barW}%;background:${color}"></div></div>
      </div>
      <div class="pi-pct-badge" style="color:${color};background:${color}18">${pct}%</div>
    </div>`;
  }).join('');

  // Approval history summary (donut-like SVG)
  const total3=aprovAprovadas+aprovRejeitadas+aprovParcial;

  // Stacked bar — pre-computed to avoid triple-nested templates
  const stackedBar=(()=>{
    if(!total3) return '<div style="text-align:center;padding:8px;color:var(--t3);font-size:12px">Nenhuma aprovação processada</div>';
    const segs=[];
    if(aprovAprovadas>0) segs.push('<div style="flex:'+aprovAprovadas+';background:#22c55e;border-radius:5px;min-width:4px"></div>');
    if(aprovRejeitadas>0) segs.push('<div style="flex:'+aprovRejeitadas+';background:#ef4444;border-radius:5px;min-width:4px"></div>');
    if(aprovParcial>0) segs.push('<div style="flex:'+aprovParcial+';background:#f59e0b;border-radius:5px;min-width:4px"></div>');
    const pcts=[];
    if(aprovAprovadas>0) pcts.push('<span style="display:flex;align-items:center;gap:3px"><span style="width:8px;height:8px;background:#22c55e;border-radius:50%;display:inline-block"></span>'+Math.round(aprovAprovadas/total3*100)+'%</span>');
    if(aprovRejeitadas>0) pcts.push('<span style="display:flex;align-items:center;gap:3px"><span style="width:8px;height:8px;background:#ef4444;border-radius:50%;display:inline-block"></span>'+Math.round(aprovRejeitadas/total3*100)+'%</span>');
    if(aprovParcial>0) pcts.push('<span style="display:flex;align-items:center;gap:3px"><span style="width:8px;height:8px;background:#f59e0b;border-radius:50%;display:inline-block"></span>'+Math.round(aprovParcial/total3*100)+'%</span>');
    return '<div style="height:10px;border-radius:5px;overflow:hidden;display:flex;margin-bottom:6px;gap:2px">'+segs.join('')+'</div>'
          +'<div style="display:flex;gap:10px;font-size:10px;color:var(--t3)">'+pcts.join('')+'</div>';
  })();

  return`<div class="painel-body">

    <!-- ROW 1: KPI CARDS -->
    <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:20px">
      ${kpiCards}
    </div>

    <!-- ROW 2: COVERAGE + APPROVALS + REVISIONS -->
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:14px;align-items:start">

      <!-- COBERTURA DE ATIVIDADES -->
      <div class="pi-card">
        <div class="pi-card-hdr">
          <i class="ti ti-shield-check" style="font-size:15px;color:#0891b2"></i>
          Cobertura das atividades
          <span style="margin-left:auto;font-size:11px;color:var(--t3);font-weight:400">${totalAtivs} atividades</span>
        </div>
        <div class="pi-card-body">${covRows}</div>
      </div>

      <!-- APROVAÇÕES PENDENTES -->
      <div class="pi-card" style="${pendingCount>0?'border-color:#fca5a5;':''}">
        <div class="pi-card-hdr">
          <i class="ti ti-clock" style="font-size:15px;color:${pendingCount>0?'#b91c1c':'var(--ok)'}"></i>
          Aprovações pendentes
          ${pendingCount>0
            ?`<span class="pi-alert-badge" style="margin-left:auto">${pendingCount}</span>`
            :`<span class="pi-ok-badge" style="margin-left:auto">Em dia</span>`}
        </div>
        <div class="pi-card-body" style="padding:4px 0">
          ${aprovRows}
        </div>
        ${pendingCount>0?`<div style="padding:8px 14px;border-top:1px solid var(--bdr)">
          <button class="btn-outline" style="width:100%;font-size:12px" onclick="S.tab='aprovacao';buildSidebar();buildTopbar();buildContent()">
            Ver todas as aprovações →
          </button></div>`:''}
      </div>

      <!-- PRÓXIMAS REVISÕES -->
      <div class="pi-card">
        <div class="pi-card-hdr">
          <i class="ti ti-calendar-event" style="font-size:15px;color:#2875ca"></i>
          Próximas revisões
          ${semRevisao>0?`<span class="pi-alert-badge" style="margin-left:auto">${semRevisao} vencida${semRevisao>1?'s':''}</span>`:urgente>0?`<span class="pi-warn-badge" style="margin-left:auto">${urgente} urgente${urgente>1?'s':''}</span>`:''}
        </div>
        <div class="pi-card-body">
          ${revisaoRows||'<div style="text-align:center;padding:20px;color:var(--t3);font-size:12px">Nenhuma revisão agendada</div>'}
        </div>
      </div>

    </div>

    <!-- ROW 3: DISTRIBUICAO SETOR + HISTORICO APROVACOES + PENDENCIAS POR TIPO -->
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;align-items:start">

      <!-- DISTRIBUIÇÃO POR SETOR -->
      <div class="pi-card">
        <div class="pi-card-hdr">
          <i class="ti ti-chart-bar" style="font-size:15px;color:var(--accent)"></i>
          Atividades por setor
          <span style="margin-left:auto;font-size:11px;color:var(--t3);font-weight:400">${totalProc} processos total</span>
        </div>
        <div class="pi-card-body">${setorRows}</div>
      </div>

      <!-- HISTÓRICO DE APROVAÇÕES -->
      <div class="pi-card">
        <div class="pi-card-hdr">
          <i class="ti ti-circle-check" style="font-size:15px;color:#2e7d45"></i>
          Histórico de aprovações
          <span style="margin-left:auto;font-size:11px;color:var(--t3);font-weight:400">${total3} total</span>
        </div>
        <div class="pi-card-body">
          <!-- Stat cards row -->
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px">
            <div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:10px 8px;text-align:center">
              <div style="font-size:22px;font-weight:700;color:#166534;line-height:1">${aprovAprovadas}</div>
              <div style="font-size:10px;color:#166534;margin-top:3px;font-weight:500">Aprovadas</div>
            </div>
            <div style="background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:10px 8px;text-align:center">
              <div style="font-size:22px;font-weight:700;color:#b91c1c;line-height:1">${aprovRejeitadas}</div>
              <div style="font-size:10px;color:#b91c1c;margin-top:3px;font-weight:500">Rejeitadas</div>
            </div>
            <div style="background:#fffbeb;border:1px solid #fed7aa;border-radius:8px;padding:10px 8px;text-align:center">
              <div style="font-size:22px;font-weight:700;color:#b45309;line-height:1">${aprovParcial}</div>
              <div style="font-size:10px;color:#b45309;margin-top:3px;font-weight:500">Parciais</div>
            </div>
          </div>
          ${stackedBar}
          <div style="border-top:1px solid var(--bdr);margin-top:14px;padding-top:12px">
            <div style="font-size:11px;color:var(--t3);margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em;font-weight:600">Pendentes por tipo</div>
            ${pendsPorTipoHTML}
          </div>
        </div>
      </div>

      <!-- ITENS SEM COBERTURA -->
      <div class="pi-card">
        <div class="pi-card-hdr">
          <i class="ti ti-alert-circle" style="font-size:15px;color:#b45309"></i>
          Atividades sem cobertura
        </div>
        <div class="pi-card-body">
          ${semCobHTML}
        </div>
      </div>

    </div>
  </div>`;
}
function openModal(key){

  document.getElementById('modal-body').innerHTML=d.items.map((it,i)=>
