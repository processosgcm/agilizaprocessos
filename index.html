function closeModal(e){if(!e||e.target===document.getElementById('modal-ov'))document.getElementById('modal-ov').style.display='none'}

/* ============================================================  ATIVIDADES  */
function ativHTML(){
  const chips=S.filters.length?`<div class="chips-row">${S.filters.map((f,i)=>
    `<span class="chip">${f.k}: ${f.v}<button class="chip-rm" onclick="rmFilter(${i})">×</button></span>`
  ).join('')}</div>`:'';
  return`<div class="ativ-toolbar">
    <div class="search-row">
      <div class="search-box"><i class="ti ti-search"></i>
        <input type="text" id="srch" placeholder="Pesquisar atividades, setor, cargo, processo..." value="${esc(S.search)}" oninput="onSearch(this.value)">
      </div>
      <div class="drop-wrap" id="fwrap">
        <button class="icon-btn" id="fbtn" onclick="toggleFDrop()">
          <i class="ti ti-filter"></i> Filtros${S.filters.length?`<span class="f-badge">${S.filters.length}</span>`:''}
        </button>
        <div class="dropdown" id="fdrop" style="display:none">
          <div class="dd-sec">Setor</div>
          ${['Comercial','Financeiro','Logística','RH','Gerência'].map(s=>`<div class="dd-opt" onclick="addFilter('setor','${s}')"><i class="ti ti-building"></i>${s}</div>`).join('')}
          <div class="dd-sec" style="margin-top:5px">Vídeo</div>
          <div class="dd-opt" onclick="addFilter('video','com vídeo')"><i class="ti ti-video"></i>Com vídeo</div>
          <div class="dd-opt" onclick="addFilter('video','sem vídeo')"><i class="ti ti-video-off"></i>Sem vídeo</div>
          <div class="dd-sec" style="margin-top:5px">Manual</div>
          <div class="dd-opt" onclick="addFilter('manual','com manual')"><i class="ti ti-file-text"></i>Com manual</div>
          <div class="dd-opt" onclick="addFilter('manual','sem manual')"><i class="ti ti-file-off"></i>Sem manual</div>
        </div>
      </div>
      <div class="drop-wrap" id="cwrap">
        <button class="icon-btn" id="cbtn" onclick="toggleCDrop()"><i class="ti ti-columns"></i> Colunas</button>
        <div class="dropdown right" id="cdrop" style="display:none"><div class="dd-sec">Mostrar / reordenar colunas</div><div id="col-list"></div></div>
      </div>
    </div>${chips}
  </div>
  <div class="ativ-table-wrap"><table class="ativ-table"><thead id="at-head"></thead><tbody id="at-body"></tbody></table></div>
  ${S.detailId?detailHTML():''}`;
}
const visCols=()=>S.cols.filter(c=>c.v);
function filteredActs(){
  const q=S.search.toLowerCase();
  return ATIVS.filter(a=>{
    if(q&&!JSON.stringify(Object.values(a)).toLowerCase().includes(q))return false;
    return S.filters.every(f=>{
      if(f.k==='setor')return a.setor===f.v;
      if(f.k==='video')return f.v==='com vídeo'?!!a.video:!a.video;
      if(f.k==='manual')return f.v==='com manual'?!!a.manual:!a.manual;
      return true;
    });
  });
}
function cellVal(a,k){
  if(k==='video')return a.video?`<span class="badge-y"><i class="ti ti-check" style="font-size:10px"></i> Sim</span>`:`<span class="badge-n">—</span>`;
  if(k==='manual')return a.manual?`<span class="badge-y"><i class="ti ti-check" style="font-size:10px"></i> Sim</span>`:`<span class="badge-n">—</span>`;
  if(k==='setor')return`<span class="setor-badge s-${a.setor}">${a.setor}</span>`;
  return esc(a[k]||'—');
}
function buildAtivTable(){
  const vc=visCols();
  document.getElementById('at-head').innerHTML=`<tr>${vc.map((c,i)=>
    `<th draggable="true" ondragstart="dStart(event,${i})" ondragover="dOver(event)" ondrop="dDrop(event,${i})" ondragleave="dLeave(event)">
       <span class="col-grip"><i class="ti ti-grip-vertical"></i>${c.l}</span></th>`
  ).join('')}</tr>`;
  const rows=filteredActs();
  document.getElementById('at-body').innerHTML=rows.length
    ?rows.map(a=>`<tr onclick="openDetail(${a.id})" title="Abrir: ${esc(a.atividade)}">${vc.map(c=>`<td title="${esc(String(a[c.k]||''))}">${cellVal(a,c.k)}</td>`).join('')}</tr>`).join('')
    :`<tr><td class="empty-td" colspan="${vc.length}"><i class="ti ti-search" style="font-size:26px;display:block;margin:0 auto 8px;opacity:.25"></i>Nenhuma atividade encontrada</td></tr>`;
  buildColList();
}
function buildColList(){
  const el=document.getElementById('col-list');if(!el)return;
  el.innerHTML=S.cols.map((c,i)=>
    `<div class="col-item"><input type="checkbox" id="ck${i}" ${c.v?'checked':''} onchange="toggleCol(${i})">
     <label for="ck${i}">${c.l}</label>
     <div class="col-ord"><button onclick="moveCol(${i},-1)" ${i===0?'disabled':''}>↑</button><button onclick="moveCol(${i},1)" ${i===S.cols.length-1?'disabled':''}>↓</button></div></div>`
  ).join('');
}
function onSearch(v){S.search=v;buildAtivTable()}
function toggleFDrop(){S.fDropOpen=!S.fDropOpen;document.getElementById('fdrop').style.display=S.fDropOpen?'block':'none';if(S.fDropOpen){S.cDropOpen=false;const cd=document.getElementById('cdrop');if(cd)cd.style.display='none'}}
function toggleCDrop(){S.cDropOpen=!S.cDropOpen;document.getElementById('cdrop').style.display=S.cDropOpen?'block':'none';if(S.cDropOpen){S.fDropOpen=false;const fd=document.getElementById('fdrop');if(fd)fd.style.display='none';buildColList()}}
function addFilter(k,v){if(!S.filters.find(f=>f.k===k&&f.v===v))S.filters.push({k,v});S.fDropOpen=false;buildContent()}
function rmFilter(i){S.filters.splice(i,1);buildContent()}
function toggleCol(i){S.cols[i].v=!S.cols[i].v;buildAtivTable()}
function moveCol(i,d){const j=i+d;if(j<0||j>=S.cols.length)return;[S.cols[i],S.cols[j]]=[S.cols[j],S.cols[i]];buildAtivTable()}
function dStart(e,i){_dragIdx=i;e.dataTransfer.effectAllowed='move'}
function dOver(e){e.preventDefault();e.currentTarget.classList.add('drag-over')}
function dLeave(e){e.currentTarget.classList.remove('drag-over')}
function dDrop(e,i){
  e.currentTarget.classList.remove('drag-over');if(_dragIdx===null||_dragIdx===i)return;
  const vc=visCols();const fk=vc[_dragIdx]?.k,tk=vc[i]?.k;if(!fk||!tk)return;
  const fi=S.cols.findIndex(c=>c.k===fk),ti=S.cols.findIndex(c=>c.k===tk);
  [S.cols[fi],S.cols[ti]]=[S.cols[ti],S.cols[fi]];_dragIdx=null;buildAtivTable();
}
function openDetail(id){S.detailId=id;S.rteEditing=false;S.pickerOpen=null;buildContent()}
function closeDetail(){S.detailId=null;buildContent()}

function openVideoFullscreen(vid){
  const ov=document.createElement('div');
  ov.id='vid-fs-ov';
  ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:9999;display:flex;align-items:center;justify-content:center';
  ov.innerHTML=`<div style="position:relative;width:min(90vw,1080px);aspect-ratio:16/9">
    <iframe src="https://player.vimeo.com/video/${vid}?badge=0&autopause=0&autoplay=1" allow="autoplay;fullscreen;picture-in-picture" style="position:absolute;inset:0;width:100%;height:100%;border:none;border-radius:8px"></iframe>
    <button onclick="closeVideoFullscreen()" style="position:absolute;top:-38px;right:0;background:rgba(255,255,255,.15);border:none;color:white;border-radius:6px;padding:6px 12px;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:6px"><i class="ti ti-x"></i> Fechar (ESC)</button>
  </div>`;
  ov.addEventListener('click',function(e){if(e.target===ov)closeVideoFullscreen();});
  document.body.appendChild(ov);
}
function closeVideoFullscreen(){
  const ov=document.getElementById('vid-fs-ov');if(ov)ov.remove();
}
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeVideoFullscreen();});
function applyVimeo(){const a=ATIVS.find(x=>x.id===S.detailId);if(!a)return;const raw=(document.getElementById('vimeo-in')?.value||'').trim();const m=raw.match(/vimeo\.com\/(\d+)/);a.video=m?m[1]:raw;buildContent()}
function toggleRte(){const rte=document.getElementById('rte-body');if(rte&&S.rteEditing){const a=ATIVS.find(x=>x.id===S.detailId);if(a)a.manual=rte.innerHTML}S.rteEditing=!S.rteEditing;buildContent();if(S.rteEditing)setTimeout(()=>document.getElementById('rte-body')?.focus(),30)}
function noDefault(e){e.preventDefault()}
function rteCmd(c){document.execCommand(c,false,null)}
function openPicker(w){
  S.pickerOpen=S.pickerOpen===w?null:w;
  // Patch just the picker zones without full re-render
  _patchPickers();
}
function _patchPickers(){
  const a=ATIVS.find(x=>x.id===S.detailId);if(!a)return buildContent();
  const polZone=document.getElementById('picker-pol');
  const mapZone=document.getElementById('picker-map');
  const btxZone=document.getElementById('picker-btx');
  if(polZone) polZone.innerHTML=S.pickerOpen==='pol'?`<div class="picker">${POLS.map(p=>{const s=(a.politicas||[]).includes(p.id);return`<div class="pick-item${s?' sel':''}" onclick="toggleLink('pol',${p.id})"><i class="ti ti-${s?'check':'plus'}"></i>${esc(p.nome)}<span class="pick-sub">${esc(p.setor)}</span></div>`}).join('')}</div>`:'';
  if(mapZone) mapZone.innerHTML=S.pickerOpen==='map'?`<div class="picker">${MAPS.map(m=>{const s=(a.mapeamento||[]).includes(m.id);return`<div class="pick-item${s?' sel':''}" onclick="toggleLink('map',${m.id})"><i class="ti ti-${s?'check':'plus'}"></i>${esc(m.nome)}</div>`}).join('')}</div>`:'';
  if(btxZone) btxZone.innerHTML=S.pickerOpen==='btx'?`<div class="picker">${BTX.map(t=>{const s=(a.bitrix||[]).includes(t.id);return`<div class="pick-item${s?' sel':''}" onclick="toggleLink('btx',${t.id})"><i class="ti ti-${s?'check':'plus'}"></i>${esc(t.nome)}<span class="pick-sub">${esc(t.resp)}</span></div>`}).join('')}</div>`:'';
}
function toggleLink(type,id){
  const a=ATIVS.find(x=>x.id===S.detailId);if(!a)return;
  const arr=type==='pol'?a.politicas:(type==='map'?a.mapeamento:a.bitrix);
  const i=arr.indexOf(id);if(i>=0)arr.splice(i,1);else arr.push(id);
  S.pickerOpen=type;
  _patchPickers();
  _patchLinkedItems(type);
}
function unlinkItem(type,id){
  const a=ATIVS.find(x=>x.id===S.detailId);if(!a)return;
  const arr=type==='pol'?a.politicas:(type==='map'?a.mapeamento:a.bitrix);
  const i=arr.indexOf(id);if(i>=0)arr.splice(i,1);
  _patchLinkedItems(type);
}
function _patchLinkedItems(type){
  const a=ATIVS.find(x=>x.id===S.detailId);if(!a)return;
  const zone=document.getElementById('linked-'+type);if(!zone)return;
  if(type==='pol'){
    zone.innerHTML=(a.politicas||[]).map(pid=>{const p=POLS.find(x=>x.id===pid);return p?`<div class="task-row"><span class="setor-badge s-${p.setor}">${esc(p.setor)}</span><span class="task-name">${esc(p.nome)}</span><button class="chip-rm" onclick="unlinkItem('pol',${pid})" style="margin-left:auto">×</button></div>`:''}).join('');
  } else if(type==='map'){
    zone.innerHTML=(a.mapeamento||[]).map(mid=>{const m=MAPS.find(x=>x.id===mid);return m?`<div class="task-row"><span class="task-name">${esc(m.nome)}</span><button class="chip-rm" onclick="unlinkItem('map',${mid})" style="margin-left:auto">×</button></div>`:''}).join('');
  } else if(type==='btx'){
    zone.innerHTML=(a.bitrix||[]).map(bid=>{const t=BTX.find(x=>x.id===bid);return t?`<div class="task-row"><span class="task-name">${esc(t.nome)}</span><span class="task-resp">${esc(t.resp)}</span><button class="chip-rm" onclick="unlinkItem('btx',${bid})" style="margin-left:auto">×</button></div>`:''}).join('');
  }
}
function saveDetail(){
  const a=ATIVS.find(x=>x.id===S.detailId);if(!a)return;
  const rte=document.getElementById('rte-body');if(rte)a.manual=rte.innerHTML;
  const gv=id=>{const el=document.getElementById(id);return el?el.value?.trim():null};
  if(gv('m-ativ'))a.atividade=gv('m-ativ');
  const sel=document.getElementById('m-setor');if(sel)a.setor=sel.value;
  if(gv('m-cargo'))a.cargo=gv('m-cargo');if(gv('m-proc'))a.processo=gv('m-proc');
  if(gv('m-macro'))a.macroprocesso=gv('m-macro');if(gv('m-sub'))a.subprocesso=gv('m-sub');
  if(gv('m-abord'))a.abordagem=gv('m-abord');if(gv('m-rev'))a.proximaRevisao=gv('m-rev');
  const vRaw=gv('vimeo-in')||'';const vm=vRaw.match(/vimeo\.com\/(\d+)/);a.video=vm?vm[1]:vRaw;
  a.ultimaAlteracao=new Date().toLocaleDateString('pt-BR');
  S.rteEditing=false;
  const btn=document.getElementById('save-btn');
  if(btn){btn.innerHTML='<i class="ti ti-check" style="font-size:15px"></i> Salvo!';btn.style.background='#2e7d45'}
  dbSaveAtividade(ATIVS.find(x=>x.id===S.detailId));
  setTimeout(()=>buildContent(),1400);
}

/* ── Track-changes diff engine ── */
function tcLCS(a,b){
  const m=a.length,n=b.length;
  const dp=Array.from({length:m+1},()=>new Array(n+1).fill(0));
  for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)
    dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]+1:Math.max(dp[i-1][j],dp[i][j-1]);
  const res=[];let i=m,j=n;
  while(i>0||j>0){
    if(i>0&&j>0&&a[i-1]===b[j-1]){res.unshift({t:'eq',v:a[i-1]});i--;j--;}
    else if(j>0&&(i===0||dp[i][j-1]>=dp[i-1][j])){res.unshift({t:'ins',v:b[j-1]});j--;}
    else{res.unshift({t:'del',v:a[i-1]});i--;}
  }
  return res;
}
function tcDiff(before,after){
  /* word-level diff, preserves spaces */
  const strip=s=>(s||'').replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim();
  const wa=strip(before).split(' ');
  const wb=strip(after).split(' ');
  const ops=tcLCS(wa,wb);
  return ops.map(o=>{
    if(o.t==='eq') return esc(o.v)+' ';
    if(o.t==='del') return`<span class="tc-del">${esc(o.v)}</span> `;
    if(o.t==='ins') return`<span class="tc-ins">${esc(o.v)}</span> `;
  }).join('');
}

}

        +wrapChg(c,
          `<div class="change-hdr" style="padding:6px 10px"><span class="change-hdr-label" style="font-size:11px">${esc(label)}</span><span class="change-tag ${tagMap2[c.tipo]||'tag-campo'}">${tagLabel2[c.tipo]||c.tipo}</span></div>`
          +`<div style="padding:8px 12px"><span class="tc-del">${esc(c.antes)}</span> <span style="color:var(--t3)">-></span> <span class="tc-ins">${esc(c.depois)}</span></div>`
        )
        +`</div></div>`;
    };
    const fldPlain=(key,label)=>`<div class="meta-field"><label>${label}</label><div class="meta-val">${esc(a[key]||'—')}</div></div>`;

    /* ── MAPEAMENTO ── */
    const mapChg=getChg('mapeamento');
    let mapSection;
    if(mapChg){
      const before=mapChg.antes||[], after=mapChg.depois||[];
      const removed=before.filter(id=>!after.includes(id));
      const added=after.filter(id=>!before.includes(id));
      const kept=before.filter(id=>after.includes(id));
      mapSection=wrapChg(mapChg,
        `<div class="change-hdr"><span class="change-hdr-label">Mapeamento</span><span class="change-tag tag-mapeamento">Mapeamento</span></div>`
        +`<div class="det-card-body"><div class="linked-chips">`
        +kept.map(id=>{const m=MAPS.find(x=>x.id===id);return m?`<span class="lchip"><i class="ti ti-git-branch"></i>${esc(m.nome)}</span>`:''}).join('')
        +removed.map(id=>{const m=MAPS.find(x=>x.id===id);return m?`<span class="lchip tc-chip-del"><i class="ti ti-git-branch"></i>${esc(m.nome)}</span>`:''}).join('')
        +added.map(id=>{const m=MAPS.find(x=>x.id===id);return m?`<span class="lchip tc-chip-ins"><i class="ti ti-git-branch"></i>${esc(m.nome)}</span>`:''}).join('')
        +`</div>`
        +`<div style="display:flex;gap:8px;margin-top:6px;font-size:11px">`
        +(removed.length?`<span class="tc-legend-del">${removed.length} removido${removed.length>1?'s':''}</span>`:'')
        +(added.length?`<span class="tc-legend-ins">${added.length} adicionado${added.length>1?'s':''}</span>`:'')
        +`</div></div>`
      );
    } else {
      mapSection=`<div class="linked-chips">
        ${(a.mapeamento||[]).map(mid=>{const m=MAPS.find(x=>x.id===mid);return m?`<span class="lchip"><i class="ti ti-git-branch"></i>${esc(m.nome)}</span>`:''}).join('')}
        ${!(a.mapeamento||[]).length?`<span style="font-size:12px;color:var(--t3)">Nenhum</span>`:''}
      </div>`;
    }

    /* ── summary counts ── */
    const nAcc=p.changes.filter(c=>c.cStatus==='aceito').length;
    const nRej=p.changes.filter(c=>c.cStatus==='rejeitado').length;
    const nPend=p.changes.filter(c=>c.cStatus==='pendente').length;
    const canFinalize=nPend===0;

    const isNewAprov=p.changes.some(c=>(!c.antes||c.antes===''||c.antes==='[]')&&c.depois);
    const newBanner=isNewAprov&&p.status==='pendente'
      ?`<div class="aprov-novo-banner"><i class="ti ti-sparkles" style="font-size:18px"></i> <span><b>Conteúdo novo</b> — este item ainda não existia no sistema. Não há versão anterior para comparar.</span></div>`
      :'';

    const bannerMsg=p.status==='aprovado'
      ?(nAcc+' alteraç'+(nAcc===1?'ão':'ões')+' aplicada'+(nAcc===1?'':'s')+', '+nRej+' rejeitada'+(nRej===1?'':'s')+'.')
      :'Todas as alterações foram rejeitadas. Motivo: <em>'+esc(p.comentario||'')+'</em>';
    const bannerIcon='ti-'+(p.status==='aprovado'?'circle-check':'circle-x');
    const statusBanner=p.status!=='pendente'
      ?`<div class="aprov-result-banner ${p.status}"><i class="ti ${bannerIcon}"></i> ${bannerMsg}</div>`
      :'';

    const finalizeOnclick = canFinalize ? 'finalizeAprov(\'' + p.id + '\')' : '';
    const topActions=p.status==='pendente'
      ?`<span id="aprov-counter" style="font-size:12px;color:var(--t2)">${nAcc} aceito · ${nRej} rejeitado · ${nPend} pendente</span>
         <button id="aprov-finalize" class="btn-primary" style="${!canFinalize?'opacity:.45;cursor:not-allowed':''}" onclick="${finalizeOnclick}" title="${!canFinalize?'Decida todas as alterações antes de finalizar':''}">
           Finalizar revisão
         </button>`
      :`<span class="aprov-status ${p.status}">${p.status==='aprovado'?'Aprovado':'Rejeitado'}</span>`;

    const legendBar=p.status==='pendente'?`<div class="tc-legend-bar">
      <span class="tc-legend-del">Removido</span>
      <span class="tc-legend-ins">Inserido</span>
      <span style="flex:1"></span>
      <span style="font-size:12px;color:var(--t2)">Por <b>${esc(p.autor)}</b> · ${esc(p.dataEdicao)} · Aceite cada alteração individualmente</span>
    </div>`:'';

    return`<div class="detail-overlay">
      <div class="det-topbar">
        <button class="btn-back" onclick="S.aprovDetailId=null;buildContent()"><i class="ti ti-arrow-left"></i> Voltar</button>
        <span class="det-title">${esc(a.atividade)}</span>
        <span class="setor-badge s-${a.setor}" style="font-size:12px;padding:3px 10px;border-radius:20px;flex-shrink:0">${esc(a.setor)}</span>
        ${topActions}
      </div>
      ${legendBar}
      <div class="det-body">
        <div class="det-left">
          ${statusBanner}
          ${newBanner}
          <div class="det-card">
            <div class="det-card-hdr"><h3><i class="ti ti-video"></i> Vídeo</h3>${vidChg?`<span class="change-tag tag-video">Alterado</span>`:''}</div>
            <div class="det-card-body">${vidChg?videoSection:videoSection}</div>
          </div>
          <div class="det-card">
            <div class="det-card-hdr"><h3><i class="ti ti-file-text"></i> Manual</h3>${manualChanges.length?`<span class="change-tag tag-manual">${manualChanges.length} alteraç${manualChanges.length===1?'ão':'ões'}</span>`:''}</div>
            <div class="${manualChanges.length?'det-card-body':''}">
              ${manualChanges.length?manualSection:manualSection}
            </div>
          </div>
          <div class="det-card">
            <div class="det-card-hdr"><h3><i class="ti ti-file-certificate"></i> Políticas vinculadas</h3></div>
            <div class="det-card-body"><div class="linked-chips">
              ${(a.politicas||[]).map(pid=>{const pp=POLS.find(x=>x.id===pid);return pp?`<span class="lchip"><i class="ti ti-file-certificate"></i>${esc(pp.nome)}</span>`:''}).join('')}
              ${!(a.politicas||[]).length?`<span style="font-size:12px;color:var(--t3)">Nenhuma</span>`:''}
            </div></div>
          </div>
        </div>
        <div class="det-right">
          <div class="det-card">
            <div class="det-card-hdr"><h3><i class="ti ti-info-circle"></i> Informações</h3></div>
            <div class="det-card-body"><div class="meta-grid">
              ${fldChg('atividade','Atividade')}
              ${fldChg('setor','Setor')}
              ${fldChg('cargo','Cargo')}
              ${fldChg('processo','Processo')}
              ${fldChg('macroprocesso','Macroprocesso')}
              ${fldChg('subprocesso','Subprocesso')}
              ${fldChg('abordagem','Abordagem')}
              ${fldPlain('dataCriacao','Criação')}
              ${fldPlain('ultimaAlteracao','Última alteração')}
              ${fldChg('proximaRevisao','Próxima revisão')}
            </div></div>
          </div>
          <div class="det-card">
            <div class="det-card-hdr"><h3><i class="ti ti-git-branch"></i> Mapeamento</h3>${mapChg?`<span class="change-tag tag-mapeamento">Alterado</span>`:''}</div>
            <div class="det-card-body">${mapChg?mapSection:mapSection}</div>
          </div>
          <div class="det-card">
            <div class="det-card-hdr"><h3><i class="ti ti-subtask"></i> Bitrix</h3></div>
            <div class="det-card-body">${(a.bitrix||[]).length?(a.bitrix||[]).map(tid=>{const t=BTX.find(x=>x.id===tid);return t?`<div class="task-row"><i class="ti ti-subtask task-icon"></i><span class="task-name">${esc(t.nome)}</span><span class="task-resp">${esc(t.resp)}</span></div>`:''}).join(''):`<p style="font-size:12px;color:var(--t3)">Nenhuma tarefa</p>`}</div>
          </div>
        </div>
      </div>
    </div>`;
  }

  /* ── LIST VIEW ── */
  const tagMap={campo:'tag-campo',manual:'tag-manual',video:'tag-video',mapeamento:'tag-mapeamento',desenho:'tag-desenho'};
  const tagLabel={campo:'Campo',manual:'Manual',video:'Vídeo',mapeamento:'Mapeamento',desenho:'Desenho'};
  const statusLabel2={'pendente':'Pendente','aprovado':'Aprovado','rejeitado':'Rejeitado','aceito-parcial':'Parcial'};

  // Unify all approval sources into one list
  const allItems=[];
  // Atividades
  PENDING.forEach(p=>{
    const a=ATIVS.find(x=>x.id===p.ativId);if(!a)return;
    // Detect if any change is "new" (antes was empty)
    const isNew=p.changes.some(c=>(!c.antes||c.antes===''||c.antes==='[]'||c.antes==='null')&&c.depois);
    allItems.push({tipo:'atividade',id:p.id,nome:a.atividade,setor:a.setor,autor:p.autor,dataEdicao:p.dataEdicao,status:p.status,changes:p.changes,isNew,_raw:p});
  });
  // Políticas pendentes e aprovadas
  POLS.filter(p=>p._pendente||p._aprovado).forEach(p=>{
    allItems.push({tipo:'politica',id:'pol-'+p.id,nome:p.nome,setor:p.setor,autor:'Usuário atual',dataEdicao:p.ultimaAlteracao||'—',status:p._pendente?'pendente':'aprovado',changes:[],isNew:!!p._isNew,_raw:p});
  });
  // Bitrix pendentes
  BTX_PENDING.forEach(p=>{
    const t=BTX.find(x=>x.id===p.btxId);if(!t)return;
    const isNew=p.changes.some(c=>(!c.antes||c.antes==='')&&c.depois);
    allItems.push({tipo:'bitrix',id:p.id,nome:t.nome,setor:t.fluxo.split(' - ')[0].replace('Dpto ',''),autor:p.autor,dataEdicao:p.dataEdicao,status:p.status,changes:p.changes,isNew,_raw:p});
  });

  // Filter
  const qF=S.aprovSearch.toLowerCase();
  const filtered=allItems.filter(i=>{
    if(qF&&!(i.nome+i.setor+i.autor).toLowerCase().includes(qF))return false;
    if(S.aprovTipo==='todos') return true;
    if(S.aprovTipo==='atividade') return i.tipo==='atividade'&&!i.changes.some(c=>c.tipo==='video'||c.tipo==='mapeamento'||c.tipo==='desenho');
    if(S.aprovTipo==='video')   return i.tipo==='atividade'&&i.changes.some(c=>c.tipo==='video');
    if(S.aprovTipo==='mapeamento') return i.tipo==='atividade'&&i.changes.some(c=>c.tipo==='mapeamento'||c.tipo==='desenho');
    if(S.aprovTipo==='politica') return i.tipo==='politica';
    if(S.aprovTipo==='bitrix')  return i.tipo==='bitrix';
    return true;
  });

  const counts={todos:allItems.length,atividade:0,video:0,mapeamento:0,politica:0,bitrix:0};
  allItems.forEach(i=>{
    if(i.tipo==='politica'){counts.politica++;}
    else if(i.tipo==='bitrix'){counts.bitrix++;}
    else if(i.tipo==='atividade'){
      if(i.changes.some(c=>c.tipo==='video')) counts.video++;
      else if(i.changes.some(c=>c.tipo==='mapeamento'||c.tipo==='desenho')) counts.mapeamento++;
      else counts.atividade++;
    }
  });

  const tipoLabel={atividade:'Atividade',politica:'Política',bitrix:'Tarefa Bitrix'};
  const tipoColor={atividade:'tag-campo',politica:'tag-mapeamento',bitrix:'tag-desenho'};
  const tipoIcon={atividade:'ti-checklist',politica:'ti-file-certificate',bitrix:'ti-subtask'};

  const pending=filtered.filter(i=>i.status==='pendente');
  const resolved=filtered.filter(i=>i.status!=='pendente');

  const renderRow=(i)=>{
    // Smart tipo badge for atividade items — show Video or Mapeamento if changes contain them
    let dispLabel=tipoLabel[i.tipo]||i.tipo, dispColor=tipoColor[i.tipo]||'tag-campo', dispIcon=tipoIcon[i.tipo]||'ti-file';
    if(i.tipo==='atividade'){
      if(i.changes.some(c=>c.tipo==='video')){dispLabel='Vídeo';dispColor='tag-video';dispIcon='ti-video';}
      else if(i.changes.some(c=>c.tipo==='mapeamento'||c.tipo==='desenho')){dispLabel='Mapeamento';dispColor='tag-mapeamento';dispIcon='ti-map-2';}
    }
    const tags=i.changes.length
      ?i.changes.map(c=>`<span class="change-tag ${tagMap[c.tipo]||'tag-campo'}" style="margin-right:3px">${tagLabel[c.tipo]||c.tipo}</span>`).join('')
      :(i.tipo==='politica'?'<span class="change-tag tag-manual">Conteúdo</span>':'—');
    const onclk=i.tipo==='atividade'||i.tipo==='bitrix'
      ?`S.aprovDetailId='${i.id}';buildContent()`
      :`S.prevTab='aprovacao';S.tab='politicas';S.polDetailId=${i._raw.id};buildSidebar();buildTopbar();buildContent()`;
    const statusBadge=`<span class="aprov-status ${i.status}">${statusLabel2[i.status]||i.status}</span>`;
    const tipoBadge=`<span class="change-tag ${dispColor}" style="display:inline-flex;align-items:center;gap:3px"><i class="ti ${dispIcon}" style="font-size:10px"></i>${dispLabel}</span>${i.isNew?'<span class="aprov-novo-badge">NOVO</span>':''}`;
    return`<tr onclick="${onclk}" style="cursor:pointer">
      <td>${tipoBadge}</td>
      <td style="font-weight:500;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(i.nome)}</td>
      <td><span class="setor-badge s-${i.setor}">${esc(i.setor)}</span></td>
      <td style="color:var(--t2);font-size:12px">${esc(i.autor)}</td>
      <td><div style="display:flex;flex-wrap:wrap;gap:3px">${tags}</div></td>
      <td style="color:var(--t2);font-size:12px;white-space:nowrap">${esc(i.dataEdicao)}</td>
      <td>${statusBadge}</td>
    </tr>`;
  };

  const renderTable=(list)=>`
    <table class="ativ-table">
      <thead><tr>
        <th style="width:110px"><span class="col-grip"><i class="ti ti-grip-vertical"></i>Tipo</span></th>
        <th><span class="col-grip"><i class="ti ti-grip-vertical"></i>Nome</span></th>
        <th><span class="col-grip"><i class="ti ti-grip-vertical"></i>Setor</span></th>
        <th><span class="col-grip"><i class="ti ti-grip-vertical"></i>Editado por</span></th>
        <th><span class="col-grip"><i class="ti ti-grip-vertical"></i>Alterações</span></th>
        <th><span class="col-grip"><i class="ti ti-grip-vertical"></i>Data</span></th>
        <th><span class="col-grip"><i class="ti ti-grip-vertical"></i>Status</span></th>
      </tr></thead>
      <tbody>${list.map(renderRow).join('')}</tbody>
    </table>`;

  const pendingCount=pending.length;
  const resolvedCount=resolved.length;
  const showPending=S.aprovTipo!=='processadas';

  return`
  <div class="ativ-toolbar">
    <div class="search-row">
      <div class="search-box"><i class="ti ti-search"></i>
        <input type="text" id="asrch" placeholder="Pesquisar por nome, editor ou setor..." value="${esc(S.aprovSearch)}" oninput="S.aprovSearch=this.value;buildContent()">
      </div>
    </div>
  </div>
  <div style="display:flex;border-bottom:2px solid var(--bdr);margin:0 0 0 0;background:var(--sur)">
    <button onclick="S.aprovTipo='pendentes';buildContent()" style="padding:12px 24px;font-size:13px;font-weight:600;background:none;border:none;cursor:pointer;border-bottom:${showPending?'2px solid var(--accent)':'2px solid transparent'};color:${showPending?'var(--accent)':'var(--t2)'};margin-bottom:-2px;display:flex;align-items:center;gap:7px;font-family:inherit;transition:color var(--tr)">
      <i class="ti ti-clock" style="font-size:14px"></i>
      Pendentes de Aprovação
      ${pendingCount>0?`<span style="background:${showPending?'var(--accent)':'#e8eef6'};color:${showPending?'#fff':'var(--t2)'};border-radius:20px;font-size:11px;font-weight:700;padding:1px 8px;min-width:20px;text-align:center">${pendingCount}</span>`:''}
    </button>
    <button onclick="S.aprovTipo='processadas';buildContent()" style="padding:12px 24px;font-size:13px;font-weight:600;background:none;border:none;cursor:pointer;border-bottom:${!showPending?'2px solid var(--accent)':'2px solid transparent'};color:${!showPending?'var(--accent)':'var(--t2)'};margin-bottom:-2px;display:flex;align-items:center;gap:7px;font-family:inherit;transition:color var(--tr)">
      <i class="ti ti-circle-check" style="font-size:14px"></i>
      Já Processadas
      ${resolvedCount>0?`<span style="background:${!showPending?'var(--accent)':'#e8eef6'};color:${!showPending?'#fff':'var(--t2)'};border-radius:20px;font-size:11px;font-weight:700;padding:1px 8px;min-width:20px;text-align:center">${resolvedCount}</span>`:''}
    </button>
  </div>
  <div class="ativ-table-wrap" style="padding:0 16px 16px">
    ${showPending
      ?(!pending.length
        ?`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:60px;color:var(--t3)">
            <i class="ti ti-circle-check" style="font-size:48px;color:var(--ok);opacity:.5"></i>
            <p style="font-size:13px;font-weight:500">Tudo certo! Nenhuma aprovação pendente.</p>
          </div>`
        :renderTable(pending))
      :(!resolved.length
        ?`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:60px;color:var(--t3)">
            <i class="ti ti-history" style="font-size:48px;opacity:.25"></i>
            <p style="font-size:13px">Nenhuma aprovação processada ainda.</p>
          </div>`
        :renderTable(resolved))}
  </div>`;
}

function toggleRejectBox(cid){
  S.aprovRejectCid = S.aprovRejectCid===cid ? null : cid;
  _patchChangeBlock(cid);
}
function confirmChangeReject(pid,cid){
  const p=PENDING.find(x=>x.id===pid);if(!p)return;
  const c=p.changes.find(x=>x.cid===cid);if(!c)return;
  const ta=document.getElementById('rej-ta-'+cid);
  c.rejectComment=(ta?ta.value.trim():'') || '';
  c.cStatus='rejeitado';
  S.aprovRejectCid=null;
  _patchChangeBlock(cid);
  _updateTopbar(pid);
}
function finalizeBtxAprov(pid){
  const p=BTX_PENDING.find(x=>x.id===pid);if(!p)return;
  const acc=p.changes.filter(c=>c.cStatus==='aceito').length;
  const rej=p.changes.filter(c=>c.cStatus==='rejeitado').length;
  if(!acc&&!rej){alert('Aceite ou rejeite ao menos uma alteração antes de finalizar.');return;}
  p.status=acc&&rej?'aceito-parcial':acc?'aprovado':'rejeitado';
  p.dataFechamento=new Date().toLocaleDateString('pt-BR');
  S.aprovDetailId=null;buildContent();
}

function changeDecision(pid,cid,decision,src){
  const p=PENDING.find(x=>x.id===pid);if(!p)return;
  const c=p.changes.find(x=>x.cid===cid);if(!c)return;
  if(decision==='aceito'){
    c.cStatus='aceito';
    c.rejectComment='';
    if(S.aprovRejectCid===cid) S.aprovRejectCid=null;
  }
  _patchChangeBlock(cid);
  _updateTopbar(pid);
}

/* Patch only the actions area of one change block — no full re-render */
function _patchChangeBlock(cid){
  const pid=S.aprovDetailId;
  const p=PENDING.find(x=>x.id===pid);if(!p)return;
  const c=p.changes.find(x=>x.cid===cid);if(!c)return;

  /* re-render just the actions portion */
  const isAcc=c.cStatus==='aceito';
  const isRej=c.cStatus==='rejeitado';
  const isAskingRej=S.aprovRejectCid===cid;

  const accStatus   = isAcc ? '<span class="chg-status-acc">✓ Aceito</span>' : '';
  const rejLabel    = isRej
    ? '<span class="chg-status-rej">✗ Rejeitado'+(c.rejectComment?' — <em>'+esc(c.rejectComment)+'</em>':'')+'</span>'
    : '';
  const rejectBox   = isAskingRej
    ? '<div class="chg-reject-box">'
      +'<textarea id="rej-ta-'+cid+'" class="chg-reject-ta" placeholder="Descreva o motivo da rejeição..." rows="2">'+esc(c.rejectComment||'')+'</textarea>'
      +'<div class="chg-reject-actions">'
      +'<button class="btn-sec" style="font-size:12px;padding:4px 10px" onclick="S.aprovRejectCid=null;_patchChangeBlock(\''+cid+'\')">Cancelar</button>'
      +'<button class="btn-reject-confirm" style="font-size:12px;padding:4px 12px" onclick="confirmChangeReject(\''+pid+'\',\''+cid+'\')">Confirmar rejeição</button>'
      +'</div></div>'
    : '';

  const actionsHTML =
    '<div class="change-actions">'
    +'<button class="chg-btn-acc'+(isAcc?' active':'')+'" onclick="changeDecision(\''+pid+'\',\''+cid+'\',\'aceito\')">✓ Aceitar</button>'
    +'<button class="chg-btn-rej'+((isRej||isAskingRej)?' active':'')+'" onclick="toggleRejectBox(\''+cid+'\')">✗ Rejeitar</button>'
    +accStatus+rejLabel
    +'</div>'
    +rejectBox;

  /* find the wrapper for this change block */
  const wrap = document.getElementById('chg-wrap-'+cid);
  if(!wrap){ rebuildKeepScroll(); return; }

  /* update class on the block for visual state */
  const block = wrap.querySelector('.change-block');
  if(block){
    block.className='change-block'+(isAcc?' aceito':isRej?' rejeitado':'');
  }

  /* replace only actions+rejectbox zone */
  const zone = wrap.querySelector('.chg-zone');
  if(zone) zone.innerHTML = actionsHTML;
}

/* Update only the topbar counter and Finalizar button */
function _updateTopbar(pid){
  const p=PENDING.find(x=>x.id===pid);if(!p)return;
  const nAcc=p.changes.filter(c=>c.cStatus==='aceito').length;
  const nRej=p.changes.filter(c=>c.cStatus==='rejeitado').length;
  const nPend=p.changes.filter(c=>c.cStatus==='pendente').length;
  const canFinalize=nPend===0;
  const ctr=document.getElementById('aprov-counter');
  if(ctr) ctr.textContent=nAcc+' aceito · '+nRej+' rejeitado · '+nPend+' pendente';
  const fbtn=document.getElementById('aprov-finalize');
  if(fbtn){
    fbtn.style.opacity=canFinalize?'1':'0.45';
    fbtn.style.cursor=canFinalize?'pointer':'not-allowed';
    fbtn.onclick=canFinalize?()=>finalizeAprov(pid):null;
  }
}
function finalizeAprov(pid){
  const p=PENDING.find(x=>x.id===pid);if(!p)return;
  const a=ATIVS.find(x=>x.id===p.ativId);if(!a)return;
  const nAcc=p.changes.filter(c=>c.cStatus==='aceito').length;
  const nRej=p.changes.filter(c=>c.cStatus==='rejeitado').length;
  // Apply only accepted changes
  p.changes.forEach(c=>{
    if(c.cStatus!=='aceito')return;
    if(c.tipo==='campo'&&c.campo)a[c.campo]=c.depois;
    else if(c.tipo==='video')a.video=c.depois;
    else if(c.tipo==='mapeamento')a.mapeamento=[...c.depois];
    // manual: collect all accepted paragraphs
  });
  // For manual: rebuild from accepted changes
  const manChanges=p.changes.filter(c=>c.tipo==='manual');
  if(manChanges.length){
    const acceptedParts=manChanges.filter(c=>c.cStatus==='aceito').map(c=>c.depois);
    const rejectedParts=manChanges.filter(c=>c.cStatus==='rejeitado').map(c=>c.antes);
    if(acceptedParts.length||rejectedParts.length){
      a.manual='<p>'+[...acceptedParts,...rejectedParts].join(' ')+'</p>';
    }
  }
  a.ultimaAlteracao=new Date().toLocaleDateString('pt-BR');
  p.dataFechamento=new Date().toLocaleDateString('pt-BR');
  if(nAcc===0) p.status='rejeitado';
  else if(nRej===0) p.status='aprovado';
  else p.status='aceito-parcial';
  p.comentario=nRej>0?(nRej+' alteraç'+(nRej===1?'ão':'ões')+' rejeitada'+(nRej===1?'':'s')):'';
  buildContent();
}
function acceptAprov(pid){
  const p=PENDING.find(x=>x.id===pid);if(!p)return;
  p.changes.forEach(c=>c.cStatus='aceito');
  finalizeAprov(pid);
}
function confirmReject(pid){
  const p=PENDING.find(x=>x.id===pid);if(!p)return;
  const txt=(document.getElementById('reject-comment')?.value||'').trim();
  p.changes.forEach(c=>c.cStatus='rejeitado');
  p.status='rejeitado';p.comentario=txt||'Todas as alterações rejeitadas';
  S.aprovRejectId=null;buildContent();
}

/* ============================================================  BITRIX HELPERS  */
function btxToggleCheck(tid,key,iid){
  const t=BTX.find(x=>x.id===tid);if(!t)return;
  const item=t[key].find(x=>x.id===iid);if(!item)return;
  item.done=!item.done;
  // patch only the checklist section, no full rebuild
  const prog=t[key].filter(i=>i.done).length;
  const total=t[key].length;
  const pct=total?Math.round(prog/total*100):0;
  const bar=document.querySelector('[data-key="'+key+'"] ~ .btx-progress .btx-progress-fill, .btx-progress-fill');
  // just update text decoration on the label
  const span=document.querySelector('[data-iid="'+iid+'"]');
  if(span) span.className='btx-check-text'+(item.done?' done':'');
}
function btxSaveCheckText(tid,key,iid,val){
  const t=BTX.find(x=>x.id===tid);if(!t)return;
  const item=t[key].find(x=>x.id===iid);if(!item)return;
  item.texto=val.trim()||item.texto;
}
function btxAddCheck(tid,key){
  const t=BTX.find(x=>x.id===tid);if(!t)return;
  const newId=key[0]+Date.now();
  t[key].push({id:newId,texto:'Nova verificação',done:false});
  buildContent();
  setTimeout(()=>{
    const spans=document.querySelectorAll('[data-key="'+key+'"]');
    const last=spans[spans.length-1];
    if(last){last.focus();document.execCommand('selectAll',false,null);}
  },50);
}
function _btxPatchNotif(){
  const z=document.getElementById('btx-notif-zone');
  if(z) z.innerHTML='';
}
function btxSubmitEdit(tid){
  const t=BTX.find(x=>x.id===tid);if(!t)return;
  // Collect edited values
  const gv=id=>{const el=document.getElementById(id);return el?(el.tagName==='TEXTAREA'||el.tagName==='INPUT'?el.value.trim():el.innerText.trim()):null;};
  const changes=[];
  const fields=[
    {id:'btx-nome',campo:'nome',label:'Nome da tarefa'},
    {id:'btx-obj',campo:'objetivo',label:'Objetivo'},
    {id:'btx-prob',campo:'problemas',label:'Problemas de não conformidade'},
    {id:'btx-info',campo:'infoAdicionais',label:'Informações adicionais'},
    {id:'btx-prop',campo:'proprietario',label:'Proprietário'},
    {id:'btx-resp',campo:'resp',label:'Responsável'},
    {id:'btx-prazo',campo:'prazo',label:'Prazo'},
    {id:'btx-proj',campo:'projeto',label:'Projeto'},
  ];
  fields.forEach(f=>{
    const val=gv(f.id);
    if(val!==null&&val!==t[f.campo]){
      changes.push({cid:'bc'+Date.now()+f.campo,tipo:'campo',campo:f.campo,label:f.label,antes:t[f.campo]||'',depois:val,cStatus:'pendente',rejectComment:''});
    }
  });
  if(!changes.length){
    S.btxEditing=false;buildContent();return;
  }
  const pid='btx-'+tid+'-'+Date.now();
  BTX_PENDING.push({
    id:pid,btxId:tid,autor:'Usuário atual',
    dataEdicao:new Date().toLocaleDateString('pt-BR'),
    status:'pendente',changes,
  });
  S.btxEditing=false;
  buildContent();
}
function btxAcceptPending(pid){
  const p=BTX_PENDING.find(x=>x.id===pid);if(!p)return;
  const t=BTX.find(x=>x.id===p.btxId);if(!t)return;
  p.changes.forEach(c=>{if(c.cStatus==='aceito'&&c.campo) t[c.campo]=c.depois;});
  p.status='aprovado';
  p.dataFechamento=new Date().toLocaleDateString('pt-BR');
  BTX_NOTIF={id:t.id,nome:t.nome};
  S.btxDetailId=t.id;
  buildContent();
}

/* ============================================================  MAP TEXT ENGINE (MT)  */

let _mtZoom = 1;

function mtDetectType(line) {
  const l = line.trim();
  if (/^[○◯]|^início|^inicio|^start|^começo/i.test(l)) return 'start';
  if (/^[◉●■]|^fim$|^end$|^término|^encerramento/i.test(l)) return 'end';
  if (/\?$/.test(l)) return 'gateway';
  if (/^[>»]|^subprocesso|^subprocess/i.test(l)) return 'subprocess';
  return 'task';
}

function mtCleanLabel(line) {
  return line.trim().replace(/^[○◯◉●■»>]+\s*/, '').trim() || line.trim();
}

/* Parser — returns flat list of flow items.
   Gateway items carry branches:[{label, steps:[{type,label}]}]  */
function mtParse(text) {
  const rawLines = text.split('\n');
  const result = [];
  let i = 0;

  while (i < rawLines.length) {
    const raw = rawLines[i];
    const trimmed = raw.trim();
    i++;
    if (!trimmed || trimmed.startsWith('//')) continue;

    const indent = raw.match(/^(\s*)/)[1].length;
    if (indent > 0) continue; // top-level only here

    const type = mtDetectType(trimmed);
    const label = mtCleanLabel(trimmed);

    if (type !== 'gateway') {
      result.push({type, label});
      continue;
    }

    // --- Parse gateway branches ---
    const branches = [];
    let curBranch = null;

    while (i < rawLines.length) {
      const bRaw = rawLines[i];
      const bTrim = bRaw.trim();
      const bIndent = bRaw.match(/^(\s*)/)[1].length;
      if (!bTrim || bTrim.startsWith('//')) { i++; continue; }
      if (bIndent === 0) break; // back to main flow

      // Branch header: qualquer frase indentada com TAB seguida de ":" (ex: "	Sim:", "	Aprovado:", "	Cliente recusou:")
      const headerMatch = bTrim.match(/^(.+?):\s*(.*)/);
      const hasBranchIndent = bRaw.startsWith('\t') || bRaw.match(/^ {4,}/);
      if (hasBranchIndent && headerMatch) {
        const lbl2 = headerMatch[1].trim();
        curBranch = {label: lbl2, steps: []};
        if (headerMatch[2].trim()) {
          curBranch.steps.push({type: mtDetectType(headerMatch[2]), label: mtCleanLabel(headerMatch[2])});
        }
        branches.push(curBranch);
      } else if (curBranch) {
        // Continuation steps of current branch (deeper indent OR same indent after header)
        curBranch.steps.push({type: mtDetectType(bTrim), label: mtCleanLabel(bTrim)});
      }
      i++;
    }

    result.push({type: 'gateway', label, branches});
  }

  return result;
}

/* Layout — converts parsed items to positioned nodes + edges */
function mtLayout(items) {
  const CY = 260; // center Y for main flow
  const TW = 180, TH = 54;
  const GW = 46;  // gateway diamond half-size
  const ER = 28;  // event circle radius
  const GAP = 50; // horizontal gap between nodes
  const BROW = 220; // vertical spread per branch row

  let x = 60;
  let prevId = null;
  const laid = [];
  const edges = [];
  let nid = 0;
  function nxt() { return 'n' + (nid++); }
  function addEdge(from, to, label, fromSide) {
    edges.push({from, to, label:label||'', fromSide:fromSide||null});
  }

  items.forEach(function(item) {
    if (item.type === 'gateway') {
      const gwId = nxt();
      const gwNode = {id:gwId, type:'gateway', label:item.label,
        cx:x+GW, cy:CY, size:GW, x:x, y:CY-GW, w:GW*2, h:GW*2};
      if (prevId) addEdge(prevId, gwId);
      laid.push(gwNode);
      x += GW*2 + GAP;

      const branches = item.branches||[];
      const N = branches.length;

      if (N > 0) {
        const totalH = (N-1) * BROW;
        const startY = CY - totalH/2;
        let maxRight = x;
        const branchEndIds = [];

        branches.forEach(function(branch, bi) {
          const bCY = startY + bi * BROW;
          let bx = x;
          let lastId = gwId;
          const isAbove = bCY < CY - 5;
          const isBelow = bCY > CY + 5;
          const side = isAbove ? 'top' : isBelow ? 'bottom' : 'right';

          branch.steps.forEach(function(step, si) {
            const sid = nxt();
            laid.push({id:sid, type:step.type||'task', label:step.label,
              x:bx, y:bCY-TH/2, w:TW, h:TH, branchCY:bCY});
            if (si === 0) addEdge(gwId, sid, branch.label, side);
            else addEdge(lastId, sid, '');
            bx += TW + GAP;
            lastId = sid;
          });

          branchEndIds.push({id: lastId===gwId ? null : lastId, cy: bCY});
          if (bx > maxRight) maxRight = bx;
        });

        x = maxRight + GAP;
        const mergeId = 'mg'+gwId;
        laid.push({id:mergeId, type:'merge', cx:x, cy:CY, r:9, x:x-9, y:CY-9, w:18, h:18});
        branchEndIds.forEach(function(b){ if(b.id) addEdge(b.id, mergeId, ''); });
        x += 18 + GAP;
        prevId = mergeId;
      } else {
        prevId = gwId;
      }

    } else {
      const id = nxt();
      let node;
      if (item.type === 'start') {
        node = {id, type:'start', label:item.label, cx:x+ER, cy:CY, r:ER, x:x, y:CY-ER, w:ER*2, h:ER*2};
        x += ER*2 + GAP;
      } else if (item.type === 'end') {
        node = {id, type:'end', label:item.label, cx:x+ER, cy:CY, r:ER, x:x, y:CY-ER, w:ER*2, h:ER*2};
        x += ER*2 + GAP;
      } else {
        node = {id, type:item.type||'task', label:item.label, x:x, y:CY-TH/2, w:TW, h:TH};
        x += TW + GAP;
      }
      if (prevId) addEdge(prevId, id);
      laid.push(node);
      prevId = id;
    }
  });

  // Calc actual bounds
  let minY = 9999, maxY = 0;
  laid.forEach(function(n){
    const t = n.y!=null ? n.y : n.cy-n.r;
    const b = n.y!=null ? n.y+n.h : n.cy+n.r;
    if(t<minY) minY=t; if(b>maxY) maxY=b;
  });
  const pad = 50;
  const dy = minY - pad;
  laid.forEach(function(n){
    if(n.y!=null) n.y -= dy;
    if(n.cy!=null) n.cy -= dy;
  });

  return {laid, edges, w: x+60, h: maxY-dy+pad};
}

function mtWrapText(label, cx, cy, maxW, fz, color) {
  if (!label) return '';
  const chars = Math.max(8, Math.floor(maxW / (fz * 0.56)));
  const words = String(label).split(' ');
  const ls = [];
  let cur = '';
  words.forEach(function(w) {
    const test = cur ? cur+' '+w : w;
    if (test.length > chars && cur) { ls.push(cur); cur = w; }
    else cur = test;
  });
  if (cur) ls.push(cur);
  const disp = ls.slice(0,3);
  if (ls.length > 3) disp[2] = disp[2].slice(0,-2)+'…';
  const lh = fz * 1.35;
  const sy = cy - (disp.length*lh)/2 + lh*0.35;
  return disp.map(function(l,i){
    return '<text x="'+cx+'" y="'+(sy+i*lh)+'" text-anchor="middle" font-size="'+fz+'" fill="'+color+'" font-family="IBM Plex Sans,sans-serif">'+mtEsc(l)+'</text>';
  }).join('');
}

function mtEsc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function mtEdgePath(fn, tn, fromSide) {
  const fcx = fn.cx!=null ? fn.cx : fn.x+fn.w/2;
  const fcy = fn.cy!=null ? fn.cy : fn.y+fn.h/2;
  const tcx = tn.cx!=null ? tn.cx : tn.x+tn.w/2;
  const tcy = tn.cy!=null ? tn.cy : tn.y+tn.h/2;

  // Gateway → branch first task
  if (fn.type === 'gateway' && fromSide) {
    const gwX = fn.cx, gwY = fn.cy, gwS = fn.size;
    if (fromSide === 'top') {
      // From top of diamond → branch y (above)
      return 'M '+gwX+' '+(gwY-gwS)+' C '+gwX+' '+(tcy-40)+', '+(tn.x-30)+' '+tcy+', '+tn.x+' '+tcy;
    } else if (fromSide === 'bottom') {
      // From bottom of diamond → branch y (below)
      return 'M '+gwX+' '+(gwY+gwS)+' C '+gwX+' '+(tcy+40)+', '+(tn.x-30)+' '+tcy+', '+tn.x+' '+tcy;
    } else {
      // Center — from right of diamond
      return 'M '+(gwX+gwS)+' '+gwY+' L '+tn.x+' '+tcy;
    }
  }

  // Branch task → merge (curve back to center)
  if (tn.type === 'merge') {
    const x1 = fn.x!=null ? fn.x+fn.w : fn.cx+fn.r;
    const y1 = fcy;
    const x2 = tn.cx, y2 = tn.cy;
    if (Math.abs(y1-y2) < 10) return 'M '+x1+' '+y1+' L '+x2+' '+y2;
    const mx = (x1+x2)/2;
    return 'M '+x1+' '+y1+' C '+mx+' '+y1+', '+mx+' '+y2+', '+x2+' '+y2;
  }

  // Merge → next node
  if (fn.type === 'merge') {
    const x1 = fn.cx+fn.r, y1 = fn.cy;
    const x2 = tn.x!=null ? tn.x : tn.cx-tn.r;
    return 'M '+x1+' '+y1+' L '+x2+' '+y1;
  }

  // Start/end events → tasks: right/left of circle
  const x1 = (fn.type==='start'||fn.type==='end') ? fn.cx+fn.r : fn.x+fn.w;
  const y1 = fcy;
  const x2 = (tn.type==='start'||tn.type==='end') ? tn.cx-tn.r : tn.x;
  const y2 = tcy;
  if (Math.abs(y1-y2)<5) return 'M '+x1+' '+y1+' L '+x2+' '+y2;
  return 'M '+x1+' '+y1+' C '+(x1+x2)/2+' '+y1+', '+(x1+x2)/2+' '+y2+', '+x2+' '+y2;
}

function mtRenderSVG(text) {
  if (!text||!text.trim()) {
    return '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--t3);flex-direction:column;gap:12px">'
      +'<i class="ti ti-git-branch" style="font-size:48px;opacity:.2"></i>'
      +'<span style="font-size:13px">Digite o fluxo do processo no editor ao lado</span></div>';
  }

  const items = mtParse(text);
  if (!items.length) return '<div style="padding:20px;color:var(--t3);font-size:12px">Nenhum passo detectado</div>';

  const {laid, edges, w, h} = mtLayout(items);

  let defs = '<defs>'
    +'<marker id="mt-arr" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">'
    +'<polygon points="0 0,9 3.5,0 7" fill="#475569"/></marker>'
    +'<filter id="mt-sh" x="-10%" y="-10%" width="130%" height="140%">'
    +'<feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="rgba(21,101,192,0.1)"/></filter>'
    +'<pattern id="mt-grid" width="24" height="24" patternUnits="userSpaceOnUse">'
    +'<path d="M 24 0 L 0 0 0 24" fill="none" stroke="#e8eef6" stroke-width="0.6"/></pattern>'
    +'</defs>';

  let bg = '<rect width="'+w+'" height="'+h+'" fill="url(#mt-grid)"/>';

  let edgesSVG = '';
  edges.forEach(function(e) {
    const fn = laid.find(function(n){return n.id===e.from;});
    const tn = laid.find(function(n){return n.id===e.to;});
    if (!fn||!tn) return;
    const d = mtEdgePath(fn, tn, e.fromSide, e.branchCX);
    edgesSVG += '<path d="'+d+'" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#mt-arr)"/>';
    if (e.label) {
      const fcx = fn.cx!=null?fn.cx:fn.x+fn.w/2;
      const fcy = fn.cy!=null?fn.cy:fn.y+fn.h/2;
      const tcx = tn.cx!=null?tn.cx:tn.x+tn.w/2;
      const tcy = tn.cy!=null?tn.cy:tn.y+tn.h/2;
      // Posiciona o label a 35% do caminho entre o gateway e o nó destino
      const lx = fcx + (tcx - fcx) * 0.35;
      const ly = fcy + (tcy - fcy) * 0.35;
      const lw = Math.max(32, e.label.length * 6 + 16);
      edgesSVG += '<rect x="'+(lx-lw/2)+'" y="'+(ly-9)+'" width="'+lw+'" height="17" rx="4" fill="white" opacity=".95" stroke="#cbd5e1" stroke-width="1"/>';
      edgesSVG += '<text x="'+lx+'" y="'+(ly+4)+'" text-anchor="middle" font-size="10" fill="#475569" font-weight="600" font-family="IBM Plex Sans,sans-serif">'+mtEsc(e.label)+'</text>';
    }
  });

  let nodesSVG = '';
  laid.forEach(function(node) {
    if (node.type === 'start') {
      nodesSVG += '<circle cx="'+node.cx+'" cy="'+node.cy+'" r="'+node.r+'" fill="#166534" stroke="white" stroke-width="2.5" filter="url(#mt-sh)"/>';
      nodesSVG += mtWrapText(node.label, node.cx, node.cy, node.r*2.2, 11, 'white');
    } else if (node.type === 'end') {
      nodesSVG += '<circle cx="'+node.cx+'" cy="'+node.cy+'" r="'+node.r+'" fill="#7f1d1d" stroke="white" stroke-width="2.5" filter="url(#mt-sh)"/>';
      nodesSVG += '<circle cx="'+node.cx+'" cy="'+node.cy+'" r="'+(node.r-8)+'" fill="#991b1b"/>';
      nodesSVG += mtWrapText(node.label, node.cx, node.cy, node.r*2.2, 11, 'white');
    } else if (node.type === 'gateway') {
      const cx=node.cx, cy=node.cy, s=node.size;
      nodesSVG += '<polygon points="'+cx+','+(cy-s)+' '+(cx+s)+','+cy+' '+cx+','+(cy+s)+' '+(cx-s)+','+cy+'" fill="#fffbeb" stroke="#92400e" stroke-width="2" filter="url(#mt-sh)"/>';
      nodesSVG += mtWrapText(node.label, cx, cy, s*1.6, 10, '#78350f');
    } else if (node.type === 'merge') {
      nodesSVG += '<circle cx="'+node.cx+'" cy="'+node.cy+'" r="'+node.r+'" fill="#cbd5e1" stroke="#94a3b8" stroke-width="1.5"/>';
    } else if (node.type === 'subprocess') {
      nodesSVG += '<rect x="'+node.x+'" y="'+node.y+'" width="'+node.w+'" height="'+node.h+'" rx="6" fill="#eff6ff" stroke="#1d4ed8" stroke-width="2" filter="url(#mt-sh)"/>';
      nodesSVG += '<rect x="'+(node.x+3)+'" y="'+(node.y+3)+'" width="'+(node.w-6)+'" height="'+(node.h-6)+'" rx="4" fill="none" stroke="#1d4ed8" stroke-width="1"/>';
      nodesSVG += mtWrapText(node.label, node.x+node.w/2, node.y+node.h/2, node.w-20, 12, '#1e3a8a');
    } else {
      nodesSVG += '<rect x="'+node.x+'" y="'+node.y+'" width="'+node.w+'" height="'+node.h+'" rx="8" fill="white" stroke="#1565c0" stroke-width="1.5" filter="url(#mt-sh)"/>';
      nodesSVG += mtWrapText(node.label, node.x+node.w/2, node.y+node.h/2, node.w-20, 12, '#1a2535');
    }
  });

  return '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 '+w+' '+h+'" width="'+w+'" height="'+h+'" style="display:block;font-family:IBM Plex Sans,sans-serif">'
    +defs+bg+edgesSVG+nodesSVG+'</svg>';
}

function updateMapPreview(){
  const ta=document.getElementById('map-text-input');
  const inner=document.getElementById('map-svg-inner');
  if(ta&&inner) inner.innerHTML=mtRenderSVG(ta.value);
}

function mtHandleTab(e){
  if(e.key!=='Tab') return;
  e.preventDefault();
  // Use execCommand to preserve browser undo stack (Ctrl+Z)
  document.execCommand('insertText', false, '\t');
  updateMapPreview();
}

function mtZoom(factor){
  const inner=document.getElementById('map-svg-inner');
  const label=document.getElementById('mt-zoom-label');
  if(!inner) return;
  if(factor===0){_mtZoom=1;}
  else {_mtZoom=Math.min(3,Math.max(0.25,_mtZoom*factor));}
  inner.style.transform='scale('+_mtZoom+')';
  if(label) label.textContent=Math.round(_mtZoom*100)+'%';
}

        const dept=(f.nome.match(/Dpto\s+([^-]+)/)||[])[1]?.trim()||'';
        const atribBadge=f.atribuicao==='auto'
          ?'<span style="display:inline-flex;align-items:center;gap:3px;background:#e0f2fe;color:#0369a1;border-radius:6px;padding:2px 8px;font-size:11px;font-weight:600"><i class="ti ti-users" style="font-size:11px"></i>Autoatribuir</span>'
          :'<span style="display:inline-flex;align-items:center;gap:3px;background:#f0fdf4;color:#166534;border-radius:6px;padding:2px 8px;font-size:11px;font-weight:600"><i class="ti ti-user-check" style="font-size:11px"></i>Manual</span>';
        const respCell=f.atribuicao==='auto'
          ?(f.responsaveis||[]).slice(0,2).join(', ')+((f.responsaveis||[]).length>2?' +'+((f.responsaveis||[]).length-2):'')
          :esc(f.responsavel||'—');
        return'<tr onclick="S.fluxoDetailId=\''+f.id+'\';buildContent()" style="cursor:pointer">'
          +'<td><div style="font-weight:500;color:var(--t1)">'+esc(nomeShort)+'</div>'
          +'<div style="font-size:11px;color:var(--t3);margin-top:2px">'+esc(dept)+'</div></td>'
          +'<td style="white-space:nowrap">'+fmtPrazo(f.prazo||'—')+'</td>'
          +'<td>'+atribBadge+'</td>'
          +'<td style="font-size:12px;color:var(--t2)">'+respCell+'</td>'
          +'<td style="font-size:12px;color:var(--t2)">'+esc(f.projeto||'—')+'</td>'
          +'<td style="font-size:12px;color:var(--accent);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+(t?esc(t.nome):'<span style="color:var(--t3)">—</span>')+'</td>'
          +'</tr>';
      }).join('')
      :'<tr><td class="empty-td" colspan="6"><i class="ti ti-git-branch" style="font-size:26px;display:block;margin:0 auto 8px;opacity:.25"></i>Nenhum fluxo encontrado</td></tr>')
    +'</tbody></table></div>';
}

function flxAddResp(id){
  const f=FLUXOS.find(x=>x.id===id);if(!f)return;
  if(!f.responsaveis)f.responsaveis=[];
  // Save current inputs before re-render
  const list=document.getElementById('flx-resp-list');
  if(list){
    const inputs=list.querySelectorAll('input[type=text]');
    f.responsaveis=Array.from(inputs).map(i=>i.value.trim()).filter(Boolean);
  }
  f.responsaveis.push('');
  buildContent();
  // Focus last input
  setTimeout(()=>{const el=document.getElementById('flx-r'+(f.responsaveis.length-1));if(el)el.focus();},50);
}
function flxRemoveResp(id,idx){
  const f=FLUXOS.find(x=>x.id===id);if(!f)return;
  // Save current inputs
  const list=document.getElementById('flx-resp-list');
  if(list){
    const inputs=list.querySelectorAll('input[type=text]');
    f.responsaveis=Array.from(inputs).map(i=>i.value.trim()).filter(Boolean);
  }
  f.responsaveis.splice(idx,1);
  buildContent();
}

function saveFluxo(id){
  const f=FLUXOS.find(x=>x.id===id);if(!f)return;
  const nome=document.getElementById('flx-nome');
  const proj=document.getElementById('flx-projeto');
  const prazo=document.getElementById('flx-prazo');
  const tm=document.getElementById('flx-tarefaModeloId');
  const atr=document.getElementById('flx-atribuicao');
  if(nome)f.nome=nome.value.trim()||f.nome;
  if(proj)f.projeto=proj.value.trim();
  if(prazo)f.prazo=prazo.value.trim();
  if(tm)f.tarefaModeloId=tm.value?parseInt(tm.value):null;
  if(atr){
    f.atribuicao=atr.value;
    if(atr.value==='auto'){
      const list=document.getElementById('flx-resp-list');
      if(list) f.responsaveis=Array.from(list.querySelectorAll('input[type=text]')).map(i=>i.value.trim()).filter(Boolean);
      f.responsavel='';
    } else {
      const resp=document.getElementById('flx-responsavel');
      if(resp)f.responsavel=resp.value.trim();
      f.responsaveis=[];
    }
  }
  f.ultimaAlteracao=new Date().toLocaleDateString('pt-BR');
  S.fluxoEditing=false;
  buildContent();
}

function agendaHTML(){
  const q=(S.agendaSearch||'').toLowerCase();
  const setorFiltro=S.agendaSetor||'';
  const setores=[...new Set(COLABORADORES.map(c=>c.setor).filter(Boolean))].sort();

  const filtered=COLABORADORES.filter(c=>{
    if(q&&!(c.nome+c.email+c.cargo+c.setor).toLowerCase().includes(q)) return false;
    if(setorFiltro&&c.setor!==setorFiltro) return false;
    return true;
  });

  // Group by first letter
  const groups={};
  filtered.forEach(c=>{
    const l=c.nome.charAt(0).toUpperCase();
    if(!groups[l]) groups[l]=[];
    groups[l].push(c);
  });
  const letters=Object.keys(groups).sort();

  const setorColors={
    'COMERCIAL':'#dbeafe|#1e40af','FINANCEIRO':'#d1fae5|#065f46',
    'ADMINISTRATIVO':'#ede9fe|#5b21b6','RH':'#fce7f3|#9d174d',
    'OPERAÇÕES':'#e0f2fe|#0369a1','T.I':'#f0fdf4|#166534',
    'CRÉDITO/COBRANÇA':'#fef3c7|#92400e','PROCESSOS':'#f1f5f9|#334155'
  };

  const setorBadge=(s)=>{
    if(!s) return '';
    const [bg,color]=(setorColors[s]||'#f0f4f9|#4a5568').split('|');
    return`<span style="background:${bg};color:${color};border-radius:5px;font-size:10px;font-weight:600;padding:2px 7px;white-space:nowrap">${s}</span>`;
  };

  const avatar=(nome)=>{
    const parts=nome.trim().split(' ');
    const initials=(parts[0].charAt(0)+(parts.length>1?parts[parts.length-1].charAt(0):'')).toUpperCase();
    const colors=['#1565c0','#7c3aed','#0891b2','#2e7d45','#b45309','#c2410c','#0369a1','#7e22ce'];
    const idx=nome.charCodeAt(0)%colors.length;
    return`<div style="width:38px;height:38px;border-radius:50%;background:${colors[idx]};display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:700;flex-shrink:0">${initials}</div>`;
  };

  const rows=letters.map(l=>{
    const items=groups[l].map(c=>`
      <div style="display:flex;align-items:center;gap:12px;padding:10px 16px;border-bottom:1px solid var(--bdr);transition:background var(--tr);cursor:default" onmouseover="this.style.background='var(--sur2)'" onmouseout="this.style.background=''">
        ${avatar(c.nome)}
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:600;color:var(--t1)">${esc(c.nome)}</div>
          <div style="font-size:11px;color:var(--t3);margin-top:1px">${esc(c.cargo||'—')}</div>
        </div>
        ${setorBadge(c.setor)}
        ${c.email?`<a href="mailto:${esc(c.email)}" onclick="event.stopPropagation()" style="display:flex;align-items:center;gap:5px;font-size:12px;color:var(--accent);text-decoration:none;white-space:nowrap" title="${esc(c.email)}">
          <i class="ti ti-mail" style="font-size:14px"></i>
          <span style="max-width:200px;overflow:hidden;text-overflow:ellipsis">${esc(c.email)}</span>
        </a>`:''}
      </div>`).join('');
    return`<div>
      <div style="background:var(--sur2);border-bottom:1px solid var(--bdr);border-top:1px solid var(--bdr);padding:6px 16px;font-size:11px;font-weight:700;color:var(--accent);letter-spacing:.1em;position:sticky;top:0;z-index:1">${l}</div>
      ${items}
    </div>`;
  }).join('');

  const alphaNav=letters.map(l=>`<span style="font-size:11px;font-weight:600;color:var(--accent);cursor:pointer;padding:2px 4px;border-radius:4px" onmouseover="this.style.background='var(--sur2)'" onmouseout="this.style.background=''" onclick="document.querySelector('[data-letter=\\'${l}\\']').scrollIntoView({behavior:'smooth'})">${l}</span>`).join(' ');

  return`<div style="flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0">
    <!-- Toolbar -->
    <div class="ativ-toolbar">
      <div class="search-row">
        <div class="search-box"><i class="ti ti-search"></i>
          <input type="text" placeholder="Pesquisar por nome, cargo, e-mail ou setor..." value="${esc(S.agendaSearch||'')}" oninput="S.agendaSearch=this.value;buildContent()">
        </div>
        <select onchange="S.agendaSetor=this.value;buildContent()" style="padding:7px 12px;border:1px solid var(--bdr);border-radius:7px;font-size:12px;background:var(--sur);color:var(--t1);cursor:pointer">
          <option value="">Todos os setores</option>
          ${setores.map(s=>`<option value="${s}"${s===setorFiltro?' selected':''}>${s}</option>`).join('')}
        </select>
        <span style="font-size:12px;color:var(--t3);white-space:nowrap">${filtered.length} colaborador${filtered.length!==1?'es':''}</span>
      </div>
    </div>
    <!-- Alpha nav -->
    <div style="padding:6px 16px;background:var(--sur);border-bottom:1px solid var(--bdr);display:flex;gap:2px;flex-wrap:wrap">
      ${alphaNav}
    </div>
    <!-- List -->
    <div style="flex:1;overflow-y:auto;background:var(--sur)">
      ${rows||'<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:60px;color:var(--t3)"><i class="ti ti-users-group" style="font-size:48px;opacity:.2"></i><p style="font-size:13px">Nenhum colaborador encontrado</p></div>'}
    </div>
  </div>`;
}

/* ============================================================  PRAZO HELPER  */
function fmtPrazo(prazo){
  if(!prazo||prazo==='—')return'—';
  const p=prazo.split('/');if(p.length!==3)return prazo;
  const d=new Date(p[2]+'-'+p[1]+'-'+p[0]);
  const today=new Date();today.setHours(0,0,0,0);
  const diff=Math.round((d-today)/(1000*60*60*24));
  if(diff<0) return'<span style="color:var(--err);font-weight:600">Vencido</span>';
  if(diff===0)return'<span style="color:var(--err);font-weight:600">Hoje</span>';
  if(diff===1)return'<span style="color:#b45309;font-weight:600">1 dia</span>';
  if(diff<7)  return'<span style="color:#b45309;font-weight:600">'+diff+' dias</span>';
  if(diff<14) return'1 semana';
  if(diff<21) return'2 semanas';
  if(diff<28) return'3 semanas';
  if(diff<60) return Math.round(diff/7)+' semanas';
  return Math.round(diff/30)+' '+(Math.round(diff/30)===1?'mês':'meses');
}

/* ============================================================  UTILS  */
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

/* close dropdowns outside */
document.addEventListener('click',e=>{
  const fw=document.getElementById('fwrap'),cd=document.getElementById('cdrop');
  const cw=document.getElementById('cwrap'),fd=document.getElementById('fdrop');
  if(fw&&!fw.contains(e.target)&&S.fDropOpen){S.fDropOpen=false;if(fd)fd.style.display='none'}
  if(cw&&!cw.contains(e.target)&&S.cDropOpen){S.cDropOpen=false;if(cd)cd.style.display='none'}
});

/* ============================================================  INIT  */
buildSidebar();buildTopbar();buildContent();
// Carrega colaboradores do Supabase (sobrescreve dado local se disponível)
dbLoadColaboradores();
</script>
